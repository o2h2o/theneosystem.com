<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neo System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #FAF6EE; }
    #neo-topbar {
      background: #FAF6EE;
      border-bottom: 1.5px solid #D4C4B0;
      padding: 0 28px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 9999;
      box-shadow: 0 1px 4px rgba(43,24,16,0.06);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      flex-shrink: 0;
    }
    #page-container {
      height: calc(100vh - 44px);
      position: relative;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    iframe.hidden { display: none; }
    .neo-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #7B2335;
      white-space: nowrap;
      margin-right: 20px;
    }
    .neo-divider {
      width: 1.5px;
      height: 20px;
      background: #D4C4B0;
      margin-right: 4px;
      flex-shrink: 0;
    }
    #neo-nav {
      display: flex;
      gap: 0;
    }
    #neo-nav a {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: #7A6255;
      transition: color 0.15s;
    }
    #neo-nav a.active {
      color: #7B2335;
      border-bottom-color: #7B2335;
    }
    #neo-nav a:hover:not(.active) {
      color: #7B2335;
    }
  </style>
</head>
<body>
  <div id="neo-topbar">
    <span class="neo-title">The Neo System</span>
    <span class="neo-divider"></span>
    <nav id="neo-nav">
      <a href="#" id="tab-planner" class="active" data-page="planner">Weekly Planner</a>
      <a href="#" id="tab-ledger" data-page="ledger">Pocket Ledger</a>
    </nav>
  </div>
  <div id="page-container">
    <iframe id="iframe-planner"></iframe>
    <iframe id="iframe-ledger" class="hidden"></iframe>
  </div>
  <script>
    const plannerHTML = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Weekly Planner</title>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    :root {\n      --bg: #EFE6D4;\n      --bg2: #E8DBCA;\n      --card: #FAF6EE;\n      --card2: #F5F0E6;\n      --burg: #7B2335;\n      --burg-dk: #5C1A26;\n      --burg-lt: #9E3A4E;\n      --burg-xs: #F5ECF0;\n      --text: #2A1810;\n      --muted: #7A6255;\n      --border: #D4C4B0;\n      --border2: #C8B89E;\n      --shadow: 0 2px 8px rgba(43,24,16,0.10);\n      --shadow-lg: 0 8px 32px rgba(43,24,16,0.16);\n\n      --c-blue:     #C2DAED;\n      --c-pink:     #EEC8D4;\n      --c-lavender: #D2C4F0;\n      --c-mint:     #C4EDD4;\n      --c-yellow:   #EDE0C2;\n      --c-peach:    #EDD0BC;\n      --c-rose:     #F0C4C4;\n\n      --c-blue-t:     #6FA8CC;\n      --c-pink-t:     #C87A90;\n      --c-lavender-t: #7A60C0;\n      --c-mint-t:     #4AA870;\n      --c-yellow-t:   #A88840;\n      --c-peach-t:    #C07848;\n      --c-rose-t:     #C05050;\n    }\n\n    body {\n      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;\n      background: var(--bg);\n      color: var(--text);\n      min-height: 100vh;\n      display: flex;\n      flex-direction: column;\n    }\n\n    /* \u2500\u2500 HEADER \u2500\u2500 */\n    header {\n      background: var(--card);\n      border-bottom: 1.5px solid var(--border);\n      padding: 0 28px;\n      height: 56px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      position: sticky;\n      top: 0;\n      z-index: 100;\n      box-shadow: 0 1px 4px rgba(43,24,16,0.07);\n    }\n\n    .logo {\n      display: flex;\n      align-items: baseline;\n      gap: 10px;\n    }\n\n    .logo-title {\n      font-size: 15px;\n      font-weight: 700;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--burg);\n    }\n\n    .logo-dot { color: var(--border2); font-size: 11px; }\n\n    .logo-sub {\n      font-size: 11px;\n      letter-spacing: 0.10em;\n      text-transform: uppercase;\n      color: var(--muted);\n      font-weight: 500;\n    }\n\n    .week-nav {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      position: relative;\n    }\n\n    .week-label-btn {\n      font-size: 13px;\n      font-weight: 600;\n      color: var(--text);\n      min-width: 168px;\n      text-align: center;\n      padding: 5px 10px;\n      border-radius: 7px;\n      border: 1.5px solid transparent;\n      background: transparent;\n      cursor: pointer;\n      transition: background 0.15s, border-color 0.15s, color 0.15s;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 5px;\n    }\n    .week-label-btn:hover { background: var(--burg-xs); border-color: var(--burg); color: var(--burg); }\n    .week-label-btn.active { background: var(--burg-xs); border-color: var(--burg); color: var(--burg); }\n    .week-label-btn .caret { font-size: 10px; opacity: 0.6; }\n\n    .nav-btn {\n      width: 28px; height: 28px;\n      border-radius: 6px;\n      border: 1.5px solid var(--border);\n      background: var(--card2);\n      color: var(--burg);\n      cursor: pointer;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 14px;\n      font-weight: 600;\n      transition: background 0.15s, border-color 0.15s;\n    }\n    .nav-btn:hover { background: var(--burg-xs); border-color: var(--burg-lt); }\n\n    .today-btn {\n      font-size: 11px;\n      font-weight: 600;\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      padding: 4px 10px;\n      border-radius: 6px;\n      border: 1.5px solid var(--burg);\n      background: transparent;\n      color: var(--burg);\n      cursor: pointer;\n      transition: background 0.15s;\n    }\n    .today-btn:hover { background: var(--burg-xs); }\n\n    /* \u2500\u2500 MONTH PICKER POPUP \u2500\u2500 */\n    .month-picker-popup {\n      display: none;\n      position: absolute;\n      top: calc(100% + 8px);\n      left: 50%;\n      transform: translateX(-50%);\n      background: var(--card);\n      border: 1.5px solid var(--border);\n      border-radius: 14px;\n      box-shadow: var(--shadow-lg);\n      padding: 16px;\n      z-index: 300;\n      width: 266px;\n      animation: popIn 0.14s ease;\n    }\n    .month-picker-popup.open { display: block; }\n\n    @keyframes popIn {\n      from { opacity: 0; transform: translateX(-50%) translateY(-6px); }\n      to   { opacity: 1; transform: translateX(-50%) translateY(0); }\n    }\n\n    .mp-header {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      margin-bottom: 12px;\n    }\n\n    .mp-label {\n      font-size: 12px;\n      font-weight: 700;\n      color: var(--text);\n    }\n\n    .mp-nav {\n      width: 24px; height: 24px;\n      border: none; background: var(--card2);\n      border-radius: 5px;\n      color: var(--burg);\n      font-size: 14px; font-weight: 700;\n      cursor: pointer;\n      display: flex; align-items: center; justify-content: center;\n      transition: background 0.12s;\n    }\n    .mp-nav:hover { background: var(--burg-xs); }\n\n    .mp-year-label {\n      font-size: 10px;\n      color: var(--muted);\n      text-align: center;\n      margin-bottom: 8px;\n      font-weight: 600;\n      letter-spacing: 0.08em;\n    }\n\n    .mp-day-headers {\n      display: grid;\n      grid-template-columns: repeat(7, 1fr);\n      margin-bottom: 4px;\n    }\n\n    .mp-day-hdr {\n      text-align: center;\n      font-size: 9px;\n      font-weight: 700;\n      color: var(--muted);\n      padding: 2px 0;\n    }\n\n    .mp-grid {\n      display: grid;\n      grid-template-columns: repeat(7, 1fr);\n      gap: 1px;\n    }\n\n    .mp-cell {\n      text-align: center;\n      font-size: 10.5px;\n      padding: 4px 2px;\n      border-radius: 5px;\n      cursor: pointer;\n      color: var(--text);\n      position: relative;\n      transition: background 0.1s;\n    }\n    .mp-cell.empty { cursor: default; }\n    .mp-cell.other-month { color: var(--border2); }\n    .mp-cell:not(.empty):hover { background: var(--burg-xs); color: var(--burg); }\n    .mp-cell.mp-today { font-weight: 700; color: var(--burg); }\n    .mp-cell.mp-today::after {\n      content: '';\n      position: absolute;\n      bottom: 2px; left: 50%;\n      transform: translateX(-50%);\n      width: 3px; height: 3px;\n      border-radius: 50%;\n      background: var(--burg);\n    }\n\n    /* week-row highlight when it contains the viewed week */\n    .mp-week-row { display: contents; }\n    .mp-week-row.in-view .mp-cell:not(.empty) {\n      background: var(--burg-xs);\n    }\n    .mp-week-row.in-view .mp-cell:not(.empty):hover {\n      background: rgba(123,35,53,0.15);\n    }\n\n    .mp-cell.has-events::before {\n      content: '';\n      position: absolute;\n      top: 3px; right: 3px;\n      width: 4px; height: 4px;\n      border-radius: 50%;\n      background: var(--burg);\n      opacity: 0.45;\n    }\n\n    /* \u2500\u2500 BODY LAYOUT \u2500\u2500 */\n    .layout {\n      display: flex;\n      flex: 1;\n      min-height: 0;\n    }\n\n    /* \u2500\u2500 SIDEBAR \u2500\u2500 */\n    .sidebar {\n      width: 230px;\n      flex-shrink: 0;\n      border-right: 1.5px solid var(--border);\n      background: var(--card);\n      padding: 16px 14px;\n      display: flex;\n      flex-direction: column;\n      gap: 16px;\n      overflow-y: auto;\n    }\n\n    .profile-area {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      padding-bottom: 14px;\n      border-bottom: 1px solid var(--border);\n    }\n\n    .avatar {\n      width: 40px; height: 40px;\n      border-radius: 50%;\n      background: var(--burg);\n      color: white;\n      display: flex; align-items: center; justify-content: center;\n      font-size: 16px; font-weight: 700;\n      cursor: pointer;\n      flex-shrink: 0;\n      overflow: hidden;\n    }\n\n    .profile-info { flex: 1; min-width: 0; }\n\n    .profile-name {\n      font-size: 13px;\n      font-weight: 600;\n      color: var(--text);\n      cursor: pointer;\n      white-space: nowrap;\n      overflow: hidden;\n      text-overflow: ellipsis;\n    }\n\n    .profile-sub {\n      font-size: 10px;\n      color: var(--muted);\n      cursor: pointer;\n    }\n\n    /* \u2500\u2500 MINI CALENDAR \u2500\u2500 */\n    .mini-cal {\n      background: var(--card2);\n      border-radius: 10px;\n      border: 1px solid var(--border);\n      padding: 10px 10px 8px;\n    }\n\n    .mc-header {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      margin-bottom: 8px;\n    }\n\n    .mc-month-label {\n      font-size: 11px;\n      font-weight: 700;\n      color: var(--text);\n    }\n\n    .mc-nav {\n      width: 20px; height: 20px;\n      border: none; background: transparent;\n      color: var(--muted); cursor: pointer;\n      font-size: 13px; border-radius: 4px;\n      display: flex; align-items: center; justify-content: center;\n      transition: background 0.12s, color 0.12s;\n    }\n    .mc-nav:hover { background: var(--border); color: var(--burg); }\n\n    .mc-section-label {\n      font-size: 9px;\n      font-weight: 700;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--muted);\n      margin-bottom: 6px;\n    }\n\n    .mc-day-headers {\n      display: grid;\n      grid-template-columns: repeat(7, 1fr);\n      margin-bottom: 3px;\n    }\n\n    .mc-dh {\n      text-align: center;\n      font-size: 8.5px;\n      font-weight: 700;\n      color: var(--border2);\n      padding-bottom: 3px;\n    }\n\n    .mc-week-row { display: contents; }\n\n    .mc-grid {\n      display: grid;\n      grid-template-columns: repeat(7, 1fr);\n      gap: 1px;\n    }\n\n    .mc-cell {\n      aspect-ratio: 1;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 9.5px;\n      border-radius: 5px;\n      position: relative;\n      color: var(--text);\n      cursor: pointer;\n      transition: background 0.1s;\n      flex-direction: column;\n      gap: 1px;\n    }\n\n    .mc-cell.mc-empty { cursor: default; }\n    .mc-cell.mc-other { color: var(--border2); }\n\n    .mc-cell:not(.mc-empty):hover { background: var(--burg-xs); color: var(--burg); }\n\n    .mc-cell.mc-today span {\n      background: var(--burg);\n      color: white;\n      border-radius: 50%;\n      width: 17px; height: 17px;\n      display: flex; align-items: center; justify-content: center;\n    }\n\n    /* highlight entire row for in-view week */\n    .mc-week-row.in-view .mc-cell:not(.mc-empty) {\n      background: var(--burg-xs);\n    }\n    .mc-week-row.in-view .mc-cell.mc-today span {\n      background: var(--burg);\n      color: white;\n    }\n\n    .mc-dot {\n      width: 3px; height: 3px;\n      border-radius: 50%;\n      background: var(--burg);\n      opacity: 0.5;\n      margin-top: 1px;\n    }\n\n    /* Lesson plan below mini cal */\n    .lesson-plan-section {\n      display: flex;\n      flex-direction: column;\n      gap: 6px;\n    }\n\n    .lp-day-row {\n      display: flex;\n      align-items: flex-start;\n      gap: 7px;\n    }\n\n    .lp-day-label {\n      font-size: 9px;\n      font-weight: 700;\n      color: var(--muted);\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      width: 24px;\n      padding-top: 3px;\n      flex-shrink: 0;\n    }\n\n    .lp-events {\n      flex: 1;\n      display: flex;\n      flex-direction: column;\n      gap: 3px;\n    }\n\n    .lp-event-chip {\n      font-size: 9.5px;\n      padding: 2px 6px;\n      border-radius: 4px;\n      font-weight: 500;\n      color: var(--text);\n      white-space: nowrap;\n      overflow: hidden;\n      text-overflow: ellipsis;\n    }\n\n    .lp-empty {\n      font-size: 9px;\n      color: var(--border2);\n      padding-top: 3px;\n      font-style: italic;\n    }\n\n    /* \u2500\u2500 MOTIVATIONAL PHOTO \u2500\u2500 */\n    .mot-photo-section {\n      position: relative;\n    }\n\n    .mot-photo-wrap {\n      position: relative;\n      border-radius: 10px;\n      overflow: hidden;\n      border: 1.5px solid var(--border);\n      background: var(--card2);\n      cursor: pointer;\n      transition: border-color 0.15s;\n    }\n    .mot-photo-wrap:hover { border-color: var(--burg-lt); }\n    .mot-photo-wrap:hover .mot-overlay { opacity: 1; }\n\n    .mot-photo-img {\n      width: 100%;\n      aspect-ratio: 16/9;\n      object-fit: cover;\n      display: block;\n    }\n\n    .mot-photo-placeholder {\n      width: 100%;\n      aspect-ratio: 16/9;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      justify-content: center;\n      gap: 6px;\n      color: var(--muted);\n    }\n\n    .mot-photo-placeholder-icon {\n      font-size: 22px;\n      opacity: 0.5;\n    }\n\n    .mot-photo-placeholder-text {\n      font-size: 10.5px;\n      font-weight: 600;\n      color: var(--muted);\n      text-align: center;\n      line-height: 1.4;\n    }\n\n    .mot-overlay {\n      position: absolute;\n      inset: 0;\n      background: rgba(43,24,16,0.45);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 8px;\n      opacity: 0;\n      transition: opacity 0.18s;\n    }\n\n    .mot-overlay-btn {\n      font-size: 10.5px;\n      font-weight: 700;\n      color: white;\n      background: rgba(255,255,255,0.18);\n      border: 1.5px solid rgba(255,255,255,0.55);\n      border-radius: 6px;\n      padding: 5px 10px;\n      cursor: pointer;\n      backdrop-filter: blur(4px);\n      transition: background 0.12s;\n    }\n    .mot-overlay-btn:hover { background: rgba(255,255,255,0.32); }\n    .mot-overlay-btn.danger { border-color: rgba(255,160,160,0.6); color: #ffd0d0; }\n    .mot-overlay-btn.danger:hover { background: rgba(200,80,80,0.3); }\n\n    .mot-caption {\n      font-size: 10px;\n      color: var(--muted);\n      font-style: italic;\n      text-align: center;\n      margin-top: 5px;\n      line-height: 1.4;\n      cursor: pointer;\n    }\n    .mot-caption:hover { color: var(--burg); }\n\n    .mot-caption-input {\n      font-size: 10px;\n      font-style: italic;\n      text-align: center;\n      width: 100%;\n      border: none;\n      border-bottom: 1px dashed var(--border2);\n      background: transparent;\n      color: var(--text);\n      outline: none;\n      padding: 2px 0;\n      margin-top: 5px;\n      font-family: inherit;\n    }\n\n    /* \u2500\u2500 SIDEBAR TASKS \u2500\u2500 */\n    .sidebar-section-title {\n      font-size: 10px;\n      font-weight: 700;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--muted);\n      margin-bottom: 7px;\n    }\n\n    .task-list { display: flex; flex-direction: column; gap: 6px; }\n\n    .task-item {\n      display: flex;\n      align-items: flex-start;\n      gap: 7px;\n      font-size: 12px;\n      color: var(--text);\n      line-height: 1.4;\n    }\n\n    .task-item input[type=\"checkbox\"] {\n      appearance: none;\n      width: 13px; height: 13px;\n      border: 1.5px solid var(--border2);\n      border-radius: 3px;\n      flex-shrink: 0; margin-top: 1px;\n      cursor: pointer; position: relative;\n      transition: border-color 0.15s, background 0.15s;\n    }\n    .task-item input[type=\"checkbox\"]:checked { background: var(--burg); border-color: var(--burg); }\n    .task-item input[type=\"checkbox\"]:checked::after {\n      content: '';\n      position: absolute;\n      left: 2px; top: 0px;\n      width: 5px; height: 8px;\n      border: 1.5px solid white;\n      border-top: none; border-left: none;\n      transform: rotate(45deg);\n    }\n\n    .task-text { flex: 1; cursor: pointer; }\n    .task-text.done { text-decoration: line-through; color: var(--muted); }\n\n    .task-delete {\n      opacity: 0;\n      border: none; background: none;\n      color: var(--muted); cursor: pointer;\n      font-size: 14px; padding: 0; line-height: 1;\n      transition: opacity 0.15s, color 0.15s;\n    }\n    .task-item:hover .task-delete { opacity: 1; }\n    .task-delete:hover { color: var(--burg); }\n\n    .add-task-row {\n      display: flex;\n      align-items: center;\n      gap: 6px;\n      margin-top: 5px;\n    }\n\n    .add-task-input {\n      flex: 1;\n      font-size: 12px;\n      border: 1.5px solid var(--border);\n      border-radius: 5px;\n      padding: 5px 8px;\n      background: var(--card2);\n      color: var(--text);\n      outline: none;\n    }\n    .add-task-input:focus { border-color: var(--burg-lt); }\n    .add-task-input::placeholder { color: var(--muted); }\n\n    .add-task-btn {\n      width: 26px; height: 26px;\n      border-radius: 5px; border: none;\n      background: var(--burg); color: white;\n      font-size: 16px; cursor: pointer;\n      display: flex; align-items: center; justify-content: center;\n      flex-shrink: 0;\n      transition: background 0.15s;\n    }\n    .add-task-btn:hover { background: var(--burg-dk); }\n\n    .quote-box {\n      font-size: 11px;\n      font-style: italic;\n      color: var(--muted);\n      line-height: 1.5;\n      padding: 7px 9px;\n      border-left: 2.5px solid var(--burg);\n      background: var(--burg-xs);\n      border-radius: 0 4px 4px 0;\n      cursor: pointer;\n    }\n\n    /* \u2500\u2500 MAIN \u2500\u2500 */\n    .main {\n      flex: 1;\n      overflow: auto;\n      padding: 20px 22px;\n      display: flex;\n      flex-direction: column;\n      gap: 22px;\n    }\n\n    /* \u2500\u2500 WEEK GRID \u2500\u2500 */\n    .week-grid {\n      display: grid;\n      grid-template-columns: repeat(7, 1fr);\n      gap: 9px;\n    }\n\n    .day-col { display: flex; flex-direction: column; gap: 7px; min-width: 0; } nt-weight: 700; color: var(--text); margin-bottom: 2px; }\n    .cls-lp-notes { font-size: 12px; color: var(--muted); font-style: italic; }\n\n    /* color dot picker for classes */\n    .cls-color-row {\n      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;\n    }\n\n    .cls-color-dot {\n      width: 24px; height: 24px;\n      border-radius: 50%; cursor: pointer;\n      border: 2.5px solid transparent;\n      transition: border-color 0.12s, transform 0.12s;\n    }\n    .cls-color-dot:hover { transform: scale(1.15); }\n    .cls-color-dot.selected { border-color: var(--text); }\n\n    ::-webkit-scrollbar { width: 5px; height: 5px; }\n    ::-webkit-scrollbar-track { background: transparent; }\n    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }\n    ::-webkit-scrollbar-thumb:hover { background: var(--burg-lt); }\n\n    /* \u2500\u2500 RESPONSIVE \u2500\u2500 */\n    @media (max-width: 700px) {\n\n      /* Header */\n      .site-header { padding: 10px 14px; gap: 8px; flex-wrap: nowrap; }\n      .logo-dot, .logo-sub { display: none; }\n      .logo-title { font-size: 13px; }\n      .week-label-btn { font-size: 12px; min-width: 110px; padding: 4px 6px; }\n      .nav-btn { width: 28px; height: 28px; font-size: 15px; }\n      .today-btn { font-size: 10px; padding: 4px 8px; }\n\n      /* Layout: stack sidebar below main */\n      .layout { flex-direction: column; }\n\n      .sidebar {\n        width: 100%;\n        border-right: none;\n        border-bottom: 1.5px solid var(--border);\n        padding: 14px 14px;\n        gap: 14px;\n        /* collapse sidebar by default on mobile \u2014 show toggle */\n        max-height: 0;\n        overflow: hidden;\n        padding: 0 14px;\n        transition: max-height 0.3s ease, padding 0.3s ease;\n      }\n      .sidebar.open {\n        max-height: 2000px;\n        padding: 14px;\n        overflow-y: auto;\n      }\n\n      /* Sidebar toggle button */\n      .sidebar-toggle {\n        displa rnal-entry-del { opacity: 1; }\n    .journal-entry-del:hover { color: var(--burg); }\n\n    .journal-empty {\n      color: var(--muted); font-size: 13px;\n      font-style: italic; text-align: center;\n      padding: 20px 0 24px;\n    }\n\n    /* Add entry form */\n    .journal-add-form {\n      border: 1.5px solid var(--border);\n      border-radius: 10px;\n      background: var(--card2);\n      overflow: hidden;\n    }\n\n    .journal-form-top {\n      display: flex; align-items: center; gap: 10px;\n      padding: 10px 14px;\n      border-bottom: 1px solid var(--border);\n    }\n\n    .journal-form-time-label {\n      font-size: 10px; font-weight: 700;\n      text-transform: uppercase; letter-spacing: 0.08em;\n      color: var(--muted); flex-shrink: 0;\n    }\n\n    .journal-time-input {\n      font-size: 12px; font-weight: 600;\n      border: 1.5px solid var(--border); border-radius: 6px;\n      padding: 5px 9px; background: var(--card); color: var(--text);\n      outline: none; font-family: inherit;\n      transition: border-color 0.13s;\n    }\n    .journal-time-input:focus { border-color: var(--burg-lt); }\n\n    .journal-textarea {\n      width: 100%; min-height: 90px;\n      font-size: 13.5px; line-height: 1.65;\n      border: none; background: transparent; color: var(--text);\n      padding: 12px 14px; outline: none;\n      font-family: inherit; resize: none;\n      box-sizing: border-box;\n    }\n    .journal-textarea::placeholder { color: var(--muted); }\n\n    .journal-form-footer {\n      display: flex; justify-content: flex-end;\n      padding: 8px 12px;\n      border-top: 1px solid var(--border);\n      background: var(--card);\n    }\n\n    .journal-save-btn {\n      font-size: 12px; font-weight: 700;\n      color: white; background: var(--burg);\n      border: none; border-radius: 7px;\n      padding: 7px 18px; cursor: pointer;\n      font-family: inherit;\n      transition: background 0.12s;\n    }\n    .journal-save-btn:hover { background: var(--burg-dk); }\n    .journal-save-btn:disabled { background: var(--border2); cursor: not-allowed; }\n\n    /* \u2500\u2500 FOOTER \u2500\u2500 */\n    .planner-footer {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 14px 4px 6px;\n      border-top: 1px solid var(--border);\n      gap: 12px;\n      flex-wrap: wrap;\n    }\n\n    .footer-copy {\n      font-size: 11px;\n      color: var(--muted);\n      font-style: italic;\n      letter-spacing: 0.02em;\n    }\n\n    .clear-data-btn {\n      font-size: 11px;\n      font-weight: 600;\n      color: var(--muted);\n      border: 1.5px solid var(--border);\n      border-radius: 7px;\n      padding: 5px 12px;\n      background: transparent;\n      cursor: pointer;\n      transition: color 0.13s, border-color 0.13s, background 0.13s;\n    }\n    .clear-data-btn:hover {\n      color: #A03030;\n      border-color: #A03030;\n      background: #A0303010;\n    }\n    .data-io-row {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      flex-wrap: wrap;\n      gap: 8px;\n      margin-top: 10px;\n      padding-top: 10px;\n      border-top: 1px dashed var(--border);\n    }\n    .data-io-btn {\n      font-size: 11px;\n      font-weight: 600;\n      letter-spacing: 0.04em;\n      color: var(--muted);\n      border: 1.5px solid var(--border);\n      border-radius: 7px;\n      padding: 5px 12px;\n      background: transparent;\n      cursor: pointer;\n      transition: color 0.13s, border-color 0.13s, background 0.13s;\n      font-family: SF Mono, Menlo, Consolas, monospace;\n      text-transform: uppercase;\n    }\n    .data-io-btn:hover {\n      color: var(--burg);\n      border-color: var(--burg);\n      background: var(--burg-xs);\n    }\n    .data-io-msg {\n      display: none;\n      text-align: center;\n      color: var(--muted);\n      font-size: 11px;\n      width: 100%;\n      margin-top: 2px;\n    }\n\n    /* Confirm dialog */\n    .confirm-backdrop {\n      display: none;\n      position: fixed; inset: 0;\n      z-index: 500;\n      background: rgba(43,24,16,0.35);\n      backdrop-filter: blur(3px);\n      align-items: center;\n      justify-content: center;\n    }\n    .confirm-backdrop.open { display: flex; }\n\n    .confirm-box {\n      background: var(--card);\n      border-radius: 14px;\n      border: 1.5px solid var(--border);\n      padding: 28px 28px 22px;\n      width: min(340px, 90vw);\n      box-shadow: 0 12px 40px rgba(43,24,16,0.18);\n      text-align: center;\n    }\n\n    .confirm-icon { font-size: 32px; margin-bottom: 12px; }\n\n    .confirm-title {\n      font-size: 16px; font-weight: 800;\n      color: var(--text); margin-bottom: 8px;\n    }\n\n    .confirm-msg {\n      font-size: 13px; color: var(--muted);\n      line-height: 1.6; margin-bottom: 22px;\n    }\n\n    .confirm-btns {\n      display: flex; gap: 10px; justify-content: center;\n    }\n\n    .confirm-cancel {\n      flex: 1; padding: 9px 0;\n      border: 1.5px solid var(--border); border-radius: 8px;\n      background: transparent; color: var(--muted);\n      font-size: 13px; font-weight: 600;\n      cursor: pointer; font-family: inherit;\n      transition: background 0.12s, color 0.12s;\n    }\n    .confirm-cancel:hover { background: var(--card2); color: var(--text); }\n\n    .confirm-delete {\n      flex: 1; padding: 9px 0;\n      border: none; border-radius: 8px;\n      background: #A03030; color: white;\n      font-size: 13px; font-weight: 700;\n      cursor: pointer; font-family: inherit;\n      transition: background 0.12s;\n    }\n    .confirm-delete:hover { background: #7A2020; }\n  </style>\n</head>\n<body>\n\n\n<header>\n  <div class=\"logo\">\n    <span class=\"logo-title\">Weekly Planner</span>\n    <span class=\"logo-dot\">\u00b7</span>\n    <span class=\"logo-sub\">Schedule & Tasks</span>\n  </div>\n  <div class=\"week-nav\" id=\"weekNav\">\n    <button class=\"nav-btn\" id=\"prevWeek\">\u2039</button>\n    <button class=\"week-label-btn\" id=\"weekLabelBtn\" onclick=\"toggleMonthPicker()\">\n      <span id=\"weekLabel\"></span>\n      <span class=\"caret\" id=\"pickerCaret\">\u25be</span>\n    </button>\n    <button class=\"nav-btn\" id=\"nextWeek\">\u203a</button>\n    <button class=\"today-btn\" id=\"todayBtn\">Today</button>\n\n    <\!-- Month picker popup -->\n    <div class=\"month-picker-popup\" id=\"monthPickerPopup\">\n      <div class=\"mp-header\">\n        <button class=\"mp-nav\" onclick=\"prevPickerMonth(event)\">\u2039</button>\n        <span class=\"mp-label\" id=\"mpLabel\"></span>\n        <button class=\"mp-nav\" onclick=\"nextPickerMonth(event)\">\u203a</button>\n      </div>\n      <div class=\"mp-year-label\" id=\"mpYearLabel\"></div>\n      <div class=\"mp-day-headers\">\n        <div class=\"mp-day-hdr\">M</div><div class=\"mp-day-hdr\">T</div>\n        <div class=\"mp-day-hdr\">W</div><div class=\"mp-day-hdr\">T</div>\n        <div class=\"mp-day-hdr\">F</div><div class=\"mp-day-hdr\">S</div>\n        <div class=\"mp-day-hdr\">S</div>\n      </div>\n      <div class=\"mp-grid\" id=\"mpGrid\"></div>\n    </div>\n  </div>\n</header>\n\n<div class=\"layout\">\n  <\!-- Sidebar toggle (mobile only) -->\n  <button class=\"sidebar-toggle\" id=\"sidebarToggle\" onclick=\"toggleSidebar()\">\n    <span>Sidebar</span>\n    <span class=\"toggle-arrow\">\u25bc</span>\n  </button>\n  <\!-- Sidebar -->\n  <aside class=\"sidebar\" id=\"sidebarEl\">\n    <\!-- Profile (compact) -->\n    <div class=\"profile-area\">\n      <div class=\"avatar\" id=\"avatarEl\" onclick=\"openProfileModal()\">\n        <span id=\"avatarText\">?</span>\n      </div>\n      <div class=\"profile-info\">\n        <div class=\"profile-name\" id=\"profileName\" onclick=\"openProfileModal()\">Set your name</div>\n        <div class=\"profile-sub\" id=\"profileSub\" onclick=\"openProfileModal()\">Click to edit profile</div>\n      </div>\n    </div>\n\n    <\!-- Quote -->\n    <div class=\"quote-box\" id=\"quoteBox\" onclick=\"openProfileModal()\"></div>\n\n    <\!-- Motivational photo -->\n    <div class=\"mot-photo-section\">\n      <div class=\"sidebar-section-title\" style=\"margin-bottom:7px\">Motivation</div>\n      <div class=\"mot-photo-wrap\" id=\"motPhotoWrap\" onclick=\"motPhotoClick(event)\">\n        <img id=\"motPhotoImg\" class=\"mot-photo-img\" style=\"display:none\" alt=\"Motivational photo\">\n        <div class=\"mot-photo-placeholder\" id=\"motPhotoPlaceholder\">\n          <div class=\"mot-photo-placeholder-icon\">\ud83d\uddbc\ufe0f</div>\n          <div class=\"mot-photo-placeholder-text\">Click to add a<br>motivational photo</div>\n        </div>\n        <div class=\"mot-overlay\" id=\"motOverlay\">\n          <button class=\"mot-overlay-btn\" onclick=\"triggerPhotoUpload(event)\">Change</button>\n          <button class=\"mot-overlay-btn danger\" onclick=\"removePhoto(event)\">Remove</button>\n        </div>\n      </div>\n      <div id=\"motCaptionWrap\">\n        <div class=\"mot-caption\" id=\"motCaption\" onclick=\"editCaption()\" style=\"display:none\"></div>\n        <input class=\"mot-caption-input\" id=\"motCaptionInput\" placeholder=\"Add a caption\u2026\"\n               style=\"display:none\" maxlength=\"100\"\n               onblur=\"saveCaption()\" onkeydown=\"if(event.key==='Enter')this.blur()\">\n      </div>\n      <input type=\"file\" id=\"motFileInput\" accept=\"image/*\" style=\"display:none\"\n             onchange=\"handlePhotoFile(event)\">\n    </div>\n\n    <\!-- Mini lesson plan calendar -->\n    <div class=\"mini-cal\">\n      <div class=\"mc-section-label\">Lesson Plan</div>\n      <div class=\"mc-header\">\n        <button class=\"mc-nav\" id=\"mcPrev\" onclick=\"prevMiniCalMonth()\">\u2039</button>\n        <span class=\"mc-month-label\" id=\"mcMonthLabel\"></span>\n        <button class=\"mc-nav\" id=\"mcNext\" onclick=\"nextMiniCalMonth()\">\u203a</button>\n      </div>\n      <div class=\"mc-day-headers\">\n        <div class=\"mc-dh\">M</div><div class=\"mc-dh\">T</div>\n        <div class=\"mc-dh\">W</div><div class=\"mc-dh\">T</div>\n        <div class=\"mc-dh\">F</div><div class=\"mc-dh\">S</div>\n        <div class=\"mc-dh\">S</div>\n      </div>\n      <div class=\"mc-grid\" id=\"mcGrid\"></div>\n    </div>\n\n    <\!-- Lesson plan day summary -->\n    <div>\n      <div class=\"sidebar-section-title\">This Week's Schedule</div>\n      <div class=\"lesson-plan-section\" id=\"lpSection\"></div>\n    </div>\n\n    <div class=\"sidebar-divider\"></div>\n\n    <\!-- Quick to-do -->\n    <div>\n      <div class=\"sidebar-section-title\">Quick To-Do</div>\n      <div class=\"task-list\" id=\"sideTaskList\"></div>\n      <div class=\"add-task-row\">\n        <input class=\"add-task-input\" id=\"sideTaskInput\" placeholder=\"Add item\u2026\" maxlength=\"80\">\n        <button class=\"add-task-btn\" onclick=\"addSideTask()\">+</button>\n      </div>\n    </div>\n  </aside>\n\n  <\!-- Main -->\n  <main class=\"main\">\n    <div class=\"week-grid\" id=\"weekGrid\"></div>\n\n    <div class=\"tasks-panel\">\n      <div class=\"tasks-panel-header\">\n        <div class=\"tasks-panel-title\">\n          Weekly Tasks\n          <span class=\"tasks-count\" id=\"tasksCount\">0</span>\n        </div>\n        <button class=\"add-main-task-btn\" onclick=\"openTaskModal()\">+ New task</button>\n      </div>\n      <div class=\"tasks-grid\" id=\"taskGrid\"></div>\n    </div>\n\n    <\!-- Daily Tasks -->\n    <div class=\"daily-panel\">\n      <div class=\"daily-panel-header\">\n        <div class=\"daily-panel-title\">\n          Daily Tasks\n          <span class=\"tasks-count\" id=\"dailyCount\">0</span>\n        </div>\n        <div class=\"daily-date-nav\" style=\"position:relative\">\n          <button class=\"daily-nav-btn\" onclick=\"shiftDailyDate(-1)\">\u2039</button>\n          <span class=\"daily-date-label\" id=\"dailyDateLabel\" onclick=\"toggleDailyPicker(event)\"></span>\n          <button class=\"daily-nav-btn\" onclick=\"shiftDailyDate(1)\">\u203a</button>\n          <button class=\"daily-today-btn\" onclick=\"goTodayDaily()\">Today</button>\n          <\!-- Custom calendar popup -->\n          <div class=\"month-picker-popup\" id=\"dailyPickerPopup\" style=\"min-width:270px;right:0;left:auto;transform:none\">\n            <div class=\"mp-header\">\n              <button class=\"mp-nav\" onclick=\"shiftDailyPickerMonth(-1,event)\">\u2039</button>\n              <span class=\"mp-label\" id=\"dpLabel\"></span>\n              <button class=\"mp-nav\" onclick=\"shiftDailyPickerMonth(1,event)\">\u203a</button>\n            </div>\n            <div class=\"mp-year-label\" id=\"dpYearLabel\"></div>\n            <div class=\"mp-day-headers\">\n              <div class=\"mp-day-hdr\">M</div><div class=\"mp-day-hdr\">T</div>\n              <div class=\"mp-day-hdr\">W</div><div class=\"mp-day-hdr\">T</div>\n              <div class=\"mp-day-hdr\">F</div><div class=\"mp-day-hdr\">S</div>\n              <div class=\"mp-day-hdr\">S</div>\n            </div>\n            <div class=\"mp-grid\" id=\"dpGrid\"></div>\n          </div>\n        </div>\n      </div>\n      <div class=\"daily-body\">\n        <div id=\"dailyTaskList\"></div>\n        <div class=\"daily-add-row\">\n          <input class=\"daily-add-input\" id=\"dailyTaskInput\" type=\"text\" placeholder=\"Add a task for this day\u2026\" onkeydown=\"if(event.key==='Enter')addDailyTask()\">\n          <button class=\"daily-add-btn\" onclick=\"addDailyTask()\">Add</button>\n        </div>\n      </div>\n    </div>\n\n    <\!-- Full date calendar -->\n    <div class=\"cal-panel\">\n      <div class=\"cal-panel-header\">\n        <div class=\"cal-panel-title\">Calendar</div>\n        <div class=\"cal-month-nav\">\n          <button class=\"cal-nav-btn\" onclick=\"prevCalPanelMonth()\">\u2039</button>\n          <span class=\"cal-month-label\" id=\"calPanelLabel\"></span>\n          <button class=\"cal-nav-btn\" onclick=\"nextCalPanelMonth()\">\u203a</button>\n          <button class=\"cal-today-btn\" onclick=\"calPanelToday()\">Today</button>\n        </div>\n      </div>\n      <div class=\"cal-body\">\n        <div class=\"cal-day-headers\">\n          <div class=\"cal-dh\">Mon</div><div class=\"cal-dh\">Tue</div>\n          <div class=\"cal-dh\">Wed</div><div class=\"cal-dh\">Thu</div>\n          <div class=\"cal-dh\">Fri</div><div class=\"cal-dh\">Sat</div>\n          <div class=\"cal-dh\">Sun</div>\n        </div>\n        <div class=\"cal-grid\" id=\"calGrid\"></div>\n      </div>\n    </div>\n\n    <\!-- Goals Panel -->\n    <div class=\"goals-panel\" id=\"goalsPanel\">\n      <div class=\"goals-panel-header\">\n        <div class=\"cal-panel-title\">Goals</div>\n        <button class=\"btn-primary\" style=\"font-size:11px;padding:5px 11px\" onclick=\"openAddGoalModal()\">+ Add Goal</button>\n      </div>\n      <div class=\"goals-body\" id=\"goalsBody\">\n        <div class=\"goal-empty\">No goals yet \u2014 add one to get started.</div>\n      </div>\n    </div>\n\n    <\!-- Habit Tracker Panel -->\n    <div class=\"habits-panel\" id=\"habitsPanel\">\n      <div class=\"habits-panel-header\">\n        <div class=\"cal-panel-title\">Habit Tracker</div>\n        <div class=\"habits-panel-nav\" style=\"position:relative\">\n          <button class=\"daily-nav-btn\" onclick=\"shiftHabitWeek(-1)\">\u2039</button>\n          <span id=\"habitWeekLabel\" class=\"journal-date-label\" onclick=\"toggleHabitPicker(event)\"\n            style=\"min-width:90px;text-align:center\"></span>\n          <button class=\"daily-nav-btn\" onclick=\"shiftHabitWeek(1)\">\u203a</button>\n          <button class=\"daily-today-btn\" onclick=\"goTodayHabits()\">This week</button>\n          <\!-- Custom week picker popup -->\n          <div class=\"month-picker-popup\" id=\"habitPickerPopup\" style=\"min-width:270px;right:0;left:auto;transform:none\">\n            <div class=\"mp-header\">\n              <button class=\"mp-nav\" onclick=\"shiftHabitPickerMonth(-1,event)\">\u2039</button>\n              <span class=\"mp-label\" id=\"hpLabel\"></span>\n              <button class=\"mp-nav\" onclick=\"shiftHabitPickerMonth(1,event)\">\u203a</button>\n            </div>\n            <div class=\"mp-year-label\" id=\"hpYearLabel\"></div>\n            <div class=\"mp-day-headers\">\n              <div class=\"mp-day-hdr\">M</div><div class=\"mp-day-hdr\">T</div>\n              <div class=\"mp-day-hdr\">W</div><div class=\"mp-day-hdr\">T</div>\n              <div class=\"mp-day-hdr\">F</div><div class=\"mp-day-hdr\">S</div>\n              <div class=\"mp-day-hdr\">S</div>\n            </div>\n            <div class=\"mp-grid\" id=\"hpGrid\"></div>\n          </div>\n        </div>\n      </div>\n      <div class=\"habits-table-wrap\" id=\"habitsTableWrap\"></div>\n    </div>\n\n    <\!-- Countdowns Panel -->\n    <div class=\"countdowns-panel\" id=\"countdownsPanel\">\n      <div class=\"countdowns-panel-header\">\n        <div class=\"cal-panel-title\">Countdowns</div>\n        <button class=\"btn-primary\" style=\"font-size:11px;padding:5px 11px\" onclick=\"openAddCountdownModal()\">+ Add</button>\n      </div>\n      <div class=\"countdowns-scroll\" id=\"countdownsGrid\"></div>\n    </div>\n\n    <\!-- Reminders Panel -->\n    <div class=\"reminders-panel\" id=\"remindersPanel\">\n      <div class=\"reminders-panel-header\">\n        <div class=\"cal-panel-title\">Reminders</div>\n      </div>\n      <div class=\"reminders-body\" id=\"remindersBody\">\n        <div class=\"reminders-empty\">No reminders yet.</div>\n        <div class=\"reminders-add-row\">\n          <input class=\"reminder-text-input\" id=\"reminderTextInput\" type=\"text\"\n            placeholder=\"Add a reminder\u2026\"\n            onkeydown=\"if(event.key==='Enter')addReminder()\">\n          <input class=\"reminder-date-input\" id=\"reminderDateInput\" type=\"date\">\n          <button class=\"btn-primary\" style=\"font-size:11px;padding:5px 11px;white-space:nowrap\" onclick=\"addReminder()\">+ Add</button>\n        </div>\n      </div>\n    </div>\n\n    <\!-- Classes Panel -->\n    <div class=\"classes-panel\" id=\"classesPanel\">\n      <div class=\"classes-panel-header\">\n        <div class=\"cal-panel-title\">Classes</div>\n        <button class=\"btn-primary\" style=\"font-size:11px;padding:5px 11px\" onclick=\"openAddClassModal()\">+ Add Class</button>\n      </div>\n      <div class=\"classes-grid\" id=\"classesGrid\">\n        <div class=\"classes-empty\">No classes yet \u2014 add one to get started.</div>\n      </div>\n    </div>\n\n    <\!-- Brain Dump Panel -->\n    <div class=\"braindump-panel\" id=\"braindumpPanel\">\n      <div class=\"braindump-panel-header\">\n        <div class=\"cal-panel-title\">Brain Dump</div>\n      </div>\n      <div class=\"braindump-body\">\n        <textarea class=\"braindump-textarea\" id=\"braindumpTextarea\"\n          placeholder=\"Dump everything on your mind here \u2014 thoughts, ideas, things to do later\u2026\"\n          oninput=\"saveBrainDump()\"></textarea>\n        <div class=\"braindump-footer\">\n          <span id=\"braindumpSaved\" style=\"opacity:0;transition:opacity 0.4s\">Saved</span>\n          <button class=\"braindump-clear-btn\" onclick=\"clearBrainDump()\">Clear</button>\n        </div>\n      </div>\n    </div>\n\n    <\!-- Journal -->\n    <div class=\"journal-panel\">\n      <div class=\"journal-panel-header\">\n        <div class=\"tasks-panel-title\">Journal</div>\n        <div class=\"journal-date-nav\" style=\"position:relative\">\n          <button class=\"daily-nav-btn\" onclick=\"shiftJournalDate(-1)\">\u2039</button>\n          <span class=\"journal-date-label\" id=\"journalDateLabel\" onclick=\"toggleJournalPicker(event)\"></span>\n          <button class=\"daily-nav-btn\" onclick=\"shiftJournalDate(1)\">\u203a</button>\n          <button class=\"daily-today-btn\" onclick=\"goTodayJournal()\">Today</button>\n          <\!-- Custom calendar popup -->\n          <div class=\"month-picker-popup\" id=\"journalPickerPopup\" style=\"min-width:270px\">\n            <div class=\"mp-header\">\n              <button class=\"mp-nav\" onclick=\"shiftJournalPickerMonth(-1,event)\">\u2039</button>\n              <span class=\"mp-label\" id=\"jpLabel\"></span>\n              <button class=\"mp-nav\" onclick=\"shiftJournalPickerMonth(1,event)\">\u203a</button>\n            </div>\n            <div class=\"mp-year-label\" id=\"jpYearLabel\"></div>\n            <div class=\"mp-day-headers\">\n              <div class=\"mp-day-hdr\">M</div><div class=\"mp-day-hdr\">T</div>\n              <div class=\"mp-day-hdr\">W</div><div class=\"mp-day-hdr\">T</div>\n              <div class=\"mp-day-hdr\">F</div><div class=\"mp-day-hdr\">S</div>\n              <div class=\"mp-day-hdr\">S</div>\n            </div>\n            <div class=\"mp-grid\" id=\"jpGrid\"></div>\n          </div>\n        </div>\n      </div>\n      <div class=\"journal-body\">\n        <div class=\"journal-entries\" id=\"journalEntries\"></div>\n        <div class=\"journal-add-form\">\n          <div class=\"journal-form-top\">\n            <span class=\"journal-form-time-label\">Time</span>\n            <input type=\"time\" class=\"journal-time-input\" id=\"journalTimeInput\">\n          </div>\n          <textarea class=\"journal-textarea\" id=\"journalTextarea\" placeholder=\"Write your thoughts for this moment\u2026\"></textarea>\n          <div class=\"journal-form-footer\">\n            <button class=\"journal-save-btn\" onclick=\"saveJournalEntry()\">Save entry</button>\n          </div>\n        </div>\n      </div>\n    </div>\n\n    <\!-- Footer -->\n    <div class=\"planner-footer\">\n      <span class=\"footer-copy\">\u00a9 Linda Zhan</span>\n      <button class=\"clear-data-btn\" onclick=\"openClearConfirm()\">Clear all data</button>\n    </div>\n    <div class=\"data-io-row\">\n      <button class=\"data-io-btn\" onclick=\"exportPlannerData()\">Export Data</button>\n      <button class=\"data-io-btn\" onclick=\"document.getElementById('plannerImportInput').click()\">Import Data</button>\n      <input type=\"file\" id=\"plannerImportInput\" accept=\".json\" style=\"display:none\" onchange=\"importPlannerData(event)\">\n      <span class=\"data-io-msg\" id=\"dataIoMsg\"></span>\n    </div>\n  </main>\n</div>\n\n<\!-- Confirm Clear Dialog -->\n<div class=\"confirm-backdrop\" id=\"confirmBackdrop\">\n  <div class=\"confirm-box\">\n    <div class=\"confirm-icon\">\u26a0\ufe0f</div>\n    <div class=\"confirm-title\">Clear all data?</div>\n    <div class=\"confirm-msg\">This will permanently delete all your events, tasks, goals, classes, and settings. This cannot be undone.</div>\n    <div class=\"confirm-btns\">\n      <button class=\"confirm-cancel\" onclick=\"closeClearConfirm()\">Cancel</button>\n      <button class=\"confirm-delete\" onclick=\"confirmClearData()\">Yes, clear everything</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Class Detail Drawer -->\n<div class=\"cls-drawer-backdrop\" id=\"clsDrawerBackdrop\" onclick=\"closeClsDrawer(event)\">\n  <div class=\"cls-drawer\" id=\"clsDrawer\">\n    <div class=\"cls-drawer-header\">\n      <span id=\"clsDrawerTitle\" style=\"font-size:14px;font-weight:700;color:var(--text)\">Class Details</span>\n      <button class=\"cls-drawer-close\" onclick=\"closeClsDrawer()\">\u00d7</button>\n    </div>\n    <div class=\"cls-drawer-inner\">\n      <\!-- Left nav -->\n      <div class=\"cls-sidebar\">\n        <div class=\"cls-sidebar-hero\">\n          <div class=\"cls-hero-dot\" id=\"clsHeroDot\"></div>\n          <div class=\"cls-hero-subject\" id=\"clsHeroSubject\"></div>\n          <div class=\"cls-hero-teacher\" id=\"clsHeroTeacher\"></div>\n        </div>\n        <nav class=\"cls-tab-nav\" id=\"clsTabNav\">\n          <button class=\"cls-tab-btn active\" onclick=\"switchClsTab('info')\" data-tab=\"info\"><span class=\"cls-tab-icon\">\ud83d\udccb</span> Info</button>\n          <button class=\"cls-tab-btn\" onclick=\"switchClsTab('schedule')\" data-tab=\"schedule\"><span class=\"cls-tab-icon\">\ud83d\uddd3</span> Schedule</button>\n          <button class=\"cls-tab-btn\" onclick=\"switchClsTab('assignments')\" data-tab=\"assignments\"><span class=\"cls-tab-icon\">\ud83d\udcdd</span> Assignments</button>\n          <button class=\"cls-tab-btn\" onclick=\"switchClsTab('homework')\" data-tab=\"homework\"><span class=\"cls-tab-icon\">\ud83d\udcda</span> Homework Due</button>\n          <button class=\"cls-tab-btn\" onclick=\"switchClsTab('reminders')\" data-tab=\"reminders\"><span class=\"cls-tab-icon\">\ud83d\udd14</span> Reminders</button>\n          <button class=\"cls-tab-btn\" onclick=\"switchClsTab('notes')\" data-tab=\"notes\"><span class=\"cls-tab-icon\">\u270f\ufe0f</span> Notes</button>\n          <button class=\"cls-tab-btn\" onclick=\"switchClsTab('lessonplan')\" data-tab=\"lessonplan\"><span class=\"cls-tab-icon\">\ud83d\udcd6</span> Lesson Plan</button>\n        </nav>\n        <div class=\"cls-sidebar-footer\">\n          <button class=\"btn-ghost\" style=\"font-size:11px;flex:1\" onclick=\"editCurrentClass()\">Edit</button>\n          <button class=\"btn-ghost\" style=\"font-size:11px;flex:1;color:var(--burg)\" onclick=\"deleteCurrentClass()\">Delete</button>\n        </div>\n      </div>\n      <\!-- Right content -->\n      <div class=\"cls-content\">\n        <\!-- Info tab -->\n        <div class=\"cls-tab-section active\" id=\"clsTab-info\">\n          <div class=\"cls-section-title\">Class Info</div>\n          <div class=\"cls-info-grid\">\n            <div class=\"cls-info-field\">\n              <label>Subject</label>\n              <input type=\"text\" id=\"clsInfoSubject\" oninput=\"saveClsInfo()\">\n            </div>\n            <div class=\"cls-info-field\">\n              <label>Teacher</label>\n              <input type=\"text\" id=\"clsInfoTeacher\" oninput=\"saveClsInfo()\">\n            </div>\n            <div class=\"cls-info-field\">\n              <label>Room</label>\n              <input type=\"text\" id=\"clsInfoRoom\" oninput=\"saveClsInfo()\">\n            </div>\n            <div class=\"cls-info-field\">\n              <label>Color</label>\n              <div class=\"cls-color-row\" id=\"clsInfoColorRow\"></div>\n            </div>\n          </div>\n        </div>\n\n        <\!-- Schedule tab -->\n        <div class=\"cls-tab-section\" id=\"clsTab-schedule\">\n          <div class=\"cls-section-title\">Schedule</div>\n          <div class=\"cls-schedule-list\" id=\"clsScheduleList\"></div>\n          <div class=\"cls-add-row\">\n            <select id=\"clsSchedDay\">\n              <option value=\"Monday\">Monday</option>\n              <option value=\"Tuesday\">Tuesday</option>\n              <option value=\"Wednesday\">Wednesday</option>\n              <option value=\"Thursday\">Thursday</option>\n              <option value=\"Friday\">Friday</option>\n              <option value=\"Saturday\">Saturday</option>\n              <option value=\"Sunday\">Sunday</option>\n            </select>\n            <input type=\"time\" id=\"clsSchedStart\">\n            <input type=\"time\" id=\"clsSchedEnd\">\n            <button class=\"btn-primary\" style=\"font-size:11px;padding:6px 10px\" onclick=\"addClsSchedule()\">+ Add</button>\n          </div>\n        </div>\n\n        <\!-- Assignments tab -->\n        <div class=\"cls-tab-section\" id=\"clsTab-assignments\">\n          <div class=\"cls-section-title\">Assignments</div>\n          <div class=\"cls-list\" id=\"clsAssignmentList\"></div>\n          <div class=\"cls-add-row\">\n            <input type=\"text\" id=\"clsAssignTitle\" placeholder=\"Assignment title\">\n            <input type=\"date\" id=\"clsAssignDue\">\n            <button class=\"btn-primary\" style=\"font-size:11px;padding:6px 10px\" onclick=\"addClsAssignment()\">+ Add</button>\n          </div>\n        </div>\n\n        <\!-- Homework tab -->\n        <div class=\"cls-tab-section\" id=\"clsTab-homework\">\n          <div class=\"cls-section-title\">Homework Due</div>\n          <div class=\"cls-list\" id=\"clsHomeworkList\"></div>\n          <div class=\"cls-add-row\">\n            <input type=\"text\" id=\"clsHwTitle\" placeholder=\"Homework title\">\n            <input type=\"date\" id=\"clsHwDue\">\n            <button class=\"btn-primary\" style=\"font-size:11px;padding:6px 10px\" onclick=\"addClsHomework()\">+ Add</button>\n          </div>\n        </div>\n\n        <\!-- Reminders tab -->\n        <div class=\"cls-tab-section\" id=\"clsTab-reminders\">\n          <div class=\"cls-section-title\">Reminders</div>\n          <div class=\"cls-list\" id=\"clsReminderList\"></div>\n          <div class=\"cls-add-row\">\n            <input type=\"text\" id=\"clsReminderText\" placeholder=\"Reminder text\">\n            <input type=\"date\" id=\"clsReminderDate\">\n            <button class=\"btn-primary\" style=\"font-size:11px;padding:6px 10px\" onclick=\"addClsReminder()\">+ Add</button>\n          </div>\n        </div>\n\n        <\!-- Notes tab -->\n        <div class=\"cls-tab-section\" id=\"clsTab-notes\">\n          <div class=\"cls-section-title\">Notes</div>\n          <textarea class=\"cls-notes-area\" id=\"clsNotesArea\" placeholder=\"Your notes for this class...\" oninput=\"saveClsNotes()\"></textarea>\n        </div>\n\n        <\!-- Lesson Plan tab -->\n        <div class=\"cls-tab-section\" id=\"clsTab-lessonplan\">\n          <div class=\"cls-section-title\">Lesson Plan</div>\n          <div id=\"clsLessonPlanList\"></div>\n          <div class=\"cls-add-row\" style=\"margin-top:8px\">\n            <input type=\"date\" id=\"clsLpDate\">\n            <input type=\"text\" id=\"clsLpTopic\" placeholder=\"Topic\">\n            <button class=\"btn-primary\" style=\"font-size:11px;padding:6px 10px\" onclick=\"addClsLessonPlan()\">+ Add</button>\n          </div>\n          <div class=\"cls-add-row\" style=\"margin-top:4px\">\n            <input type=\"text\" id=\"clsLpNotes\" placeholder=\"Notes (optional)\" style=\"width:100%\">\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<\!-- Goal Modal -->\n<div class=\"modal-backdrop\" id=\"goalModal\">\n  <div class=\"modal\" style=\"width:340px\">\n    <div class=\"modal-title\" id=\"goalModalTitle\">Add Goal</div>\n    <button class=\"modal-close\" onclick=\"closeModal('goalModal')\">\u00d7</button>\n    <div class=\"form-row\">\n      <label>Goal Title</label>\n      <input type=\"text\" id=\"goalTitleInput\" placeholder=\"e.g. Finish coursework\" maxlength=\"60\">\n    </div>\n    <div class=\"form-row\">\n      <label>Color</label>\n      <div class=\"cls-color-row\" id=\"goalColorRow\"></div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn-ghost\" onclick=\"closeModal('goalModal')\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveGoal()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Countdown Add Modal -->\n<div class=\"modal-backdrop\" id=\"countdownModal\">\n  <div class=\"modal\" style=\"width:340px\">\n    <div class=\"modal-title\">Add Countdown</div>\n    <button class=\"modal-close\" onclick=\"closeModal('countdownModal')\">\u00d7</button>\n    <div class=\"form-row\">\n      <label>Label</label>\n      <input type=\"text\" id=\"cdLabelInput\" placeholder=\"e.g. Finals week\" maxlength=\"40\">\n    </div>\n    <div class=\"form-row\">\n      <label>Due Date</label>\n      <input type=\"date\" id=\"cdDateInput\">\n    </div>\n    <div class=\"form-row\">\n      <label>Color</label>\n      <div class=\"cls-color-row\" id=\"cdColorRow\"></div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn-ghost\" onclick=\"closeModal('countdownModal')\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveCountdown()\">Add</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Class Add/Edit Modal -->\n<div class=\"modal-backdrop\" id=\"classModal\">\n  <div class=\"modal\" style=\"width:360px\">\n    <div class=\"modal-title\" id=\"classModalTitle\">Add Class</div>\n    <button class=\"modal-close\" onclick=\"closeModal('classModal')\">\u00d7</button>\n    <div class=\"form-row\">\n      <label>Subject</label>\n      <input type=\"text\" id=\"classSubjectInput\" placeholder=\"e.g. Mathematics\" maxlength=\"40\">\n    </div>\n    <div class=\"form-row\">\n      <label>Teacher</label>\n      <input type=\"text\" id=\"classTeacherInput\" placeholder=\"e.g. Mr Smith\" maxlength=\"40\">\n    </div>\n    <div class=\"form-row\">\n      <label>Room</label>\n      <input type=\"text\" id=\"classRoomInput\" placeholder=\"e.g. Room 12\" maxlength=\"30\">\n    </div>\n    <div class=\"form-row\">\n      <label>Color</label>\n      <div class=\"cls-color-row\" id=\"classColorRow\"></div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn-ghost\" onclick=\"closeModal('classModal')\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveClass()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Event Modal -->\n<div class=\"modal-backdrop\" id=\"eventModal\">\n  <div class=\"modal\">\n    <div class=\"modal-title\" id=\"eventModalTitle\">Add Event</div>\n    <button class=\"modal-close\" onclick=\"closeEventModal()\">\u00d7</button>\n\n    <div class=\"form-row\">\n      <label>Title</label>\n      <input type=\"text\" id=\"evTitle\" placeholder=\"e.g. CS WEMT\" maxlength=\"60\">\n    </div>\n\n    <div class=\"form-two-col\">\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>Day</label>\n        <select id=\"evDay\">\n          <option>Monday</option><option>Tuesday</option><option>Wednesday</option>\n          <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>\n        </select>\n      </div>\n      <div></div>\n    </div>\n\n    <div class=\"form-two-col\" style=\"margin-top:14px\">\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>Start time</label>\n        <input type=\"time\" id=\"evStart\">\n      </div>\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>End time</label>\n        <input type=\"time\" id=\"evEnd\">\n      </div>\n    </div>\n\n    <div class=\"form-row\" style=\"margin-top:14px\">\n      <label>Colour</label>\n      <div class=\"color-picker\" id=\"evColorPicker\"></div>\n    </div>\n\n    <div class=\"modal-actions\" id=\"eventModalActions\">\n      <button class=\"btn-ghost\" onclick=\"closeEventModal()\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveEvent()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Task Modal -->\n<div class=\"modal-backdrop\" id=\"taskModal\">\n  <div class=\"modal\">\n    <div class=\"modal-title\">New Task</div>\n    <button class=\"modal-close\" onclick=\"closeTaskModal()\">\u00d7</button>\n\n    <div class=\"form-row\">\n      <label>Task</label>\n      <input type=\"text\" id=\"tkTitle\" placeholder=\"What needs to be done?\" maxlength=\"100\">\n    </div>\n\n    <div class=\"form-two-col\">\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>Priority</label>\n        <select id=\"tkPriority\">\n          <option value=\"high\">High Priority</option>\n          <option value=\"medium\" selected>Medium Priority</option>\n          <option value=\"low\">Low Priority</option>\n          <option value=\"exam\">Exam / Assignment</option>\n        </select>\n      </div>\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>Due date</label>\n        <input type=\"date\" id=\"tkDue\">\n      </div>\n    </div>\n\n    <div class=\"modal-actions\" style=\"margin-top:20px\">\n      <button class=\"btn-ghost\" onclick=\"closeTaskModal()\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveTask()\">Add Task</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Calendar Event Modal -->\n<div class=\"modal-backdrop\" id=\"calEventModal\">\n  <div class=\"modal\" style=\"width:380px\">\n    <div class=\"modal-title\" id=\"calEventModalTitle\">Add to Calendar</div>\n    <button class=\"modal-close\" onclick=\"closeCalEventModal()\">\u00d7</button>\n\n    <div class=\"form-row\">\n      <label>Date</label>\n      <input type=\"date\" id=\"ceDate\">\n    </div>\n    <div class=\"form-row\">\n      <label>Title</label>\n      <input type=\"text\" id=\"ceTitle\" placeholder=\"e.g. Biology assignment due\" maxlength=\"80\">\n    </div>\n    <div class=\"form-two-col\">\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>Start time</label>\n        <input type=\"time\" id=\"ceStart\">\n      </div>\n      <div class=\"form-row\" style=\"margin-bottom:0\">\n        <label>End time</label>\n        <input type=\"time\" id=\"ceEnd\">\n      </div>\n    </div>\n    <div class=\"form-row\" style=\"margin-top:14px\">\n      <label>Colour</label>\n      <div class=\"color-picker\" id=\"ceColorPicker\"></div>\n    </div>\n    <div class=\"form-row\">\n      <label>Note (optional)</label>\n      <textarea id=\"ceNote\" placeholder=\"Any extra details\u2026\" rows=\"2\"></textarea>\n    </div>\n\n    <div class=\"modal-actions\" id=\"calEventModalActions\">\n      <button class=\"btn-ghost\" onclick=\"closeCalEventModal()\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveCalEvent()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<\!-- Profile Modal -->\n<div class=\"modal-backdrop\" id=\"profileModal\">\n  <div class=\"modal\" style=\"width:320px\">\n    <div class=\"modal-title\">Your Profile</div>\n    <button class=\"modal-close\" onclick=\"closeModal('profileModal')\">\u00d7</button>\n\n    <div class=\"form-row\">\n      <label>Name</label>\n      <input type=\"text\" id=\"profileNameInput\" placeholder=\"Your name\" maxlength=\"30\">\n    </div>\n    <div class=\"form-row\">\n      <label>Emoji avatar</label>\n      <input type=\"text\" id=\"profileEmoji\" placeholder=\"e.g. \ud83c\udf3f\" maxlength=\"4\">\n    </div>\n    <div class=\"form-row\">\n      <label>Motivational quote</label>\n      <textarea id=\"profileQuote\" placeholder=\"A quote to inspire you\u2026\" rows=\"3\"></textarea>\n    </div>\n\n    <div class=\"modal-actions\">\n      <button class=\"btn-ghost\" onclick=\"closeModal('profileModal')\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveProfile()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<script>\n// \u2500\u2500 CONSTANTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];\n\nconst COLORS = [\n  { id:'blue',     bg:'var(--c-blue)',     border:'var(--c-blue-t)' },\n  { id:'pink',     bg:'var(--c-pink)',     border:'var(--c-pink-t)' },\n  { id:'lavender', bg:'var(--c-lavender)', border:'var(--c-lavender-t)' },\n  { id:'mint',     bg:'var(--c-mint)',     border:'var(--c-mint-t)' },\n  { id:'yellow',   bg:'var(--c-yellow)',   border:'var(--c-yellow-t)' },\n  { id:'peach',    bg:'var(--c-peach)',    border:'var(--c-peach-t)' },\n  { id:'rose',     bg:'var(--c-rose)',     border:'var(--c-rose-t)' },\n];\n\n// Resolved hex values for lesson plan chips (can't use CSS vars in inline style)\nconst COLOR_BG_HEX = {\n  blue:'#C2DAED', pink:'#EEC8D4', lavender:'#D2C4F0',\n  mint:'#C4EDD4', yellow:'#EDE0C2', peach:'#EDD0BC', rose:'#F0C4C4',\n};\n\n// \u2500\u2500 STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet state = {\n  weekOffset: 0,\n  events: [],\n  tasks: [],\n  sideTasks: [],\n  calEvents: [],\n  goals: [],\n  classes: [],\n  dailyTasks: [],\n  journal: [],\n  countdowns: [],\n  habits: { list: [], log: {} },\n  reminders: [],\n  brainDump: '',\n  profile: { name:'', emoji:'', quote:'Be happy for this moment. This moment is your life.' },\n};\n\nlet editingEventId = null;\nlet selectedColor = 'blue';\n\n// Mini cal display month (1st of that month)\nlet mcDate = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();\n\n// Month picker display month\nlet mpDate = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();\n\n// \u2500\u2500 PERSISTENCE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction load() {\n  try {\n    const raw = localStorage.getItem('weeklyPlanner_v2');\n    if (raw) {\n      const p = JSON.parse(raw);\n      state.events    = p.events    || [];\n      state.tasks     = p.tasks     || [];\n      state.sideTasks = p.sideTasks || [];\n      state.calEvents = p.calEvents || [];\n      state.goals       = p.goals       || [];\n      state.classes     = p.classes     || [];\n      state.dailyTasks  = p.dailyTasks  || [];\n      state.journal     = p.journal     || [];\n      state.countdowns  = p.countdowns  || [];\n      state.habits      = p.habits      || { list: [], log: {} };\n      state.reminders   = p.reminders   || [];\n      state.brainDump   = p.brainDump   || '';\n      state.profile   = { ...state.profile, ...(p.profile || {}) };\n    }\n  } catch(e) {}\n}\n\nfunction save() {\n  localStorage.setItem('weeklyPlanner_v2', JSON.stringify({\n    events: state.events, tasks: state.tasks,\n    sideTasks: state.sideTasks, calEvents: state.calEvents,\n    goals: state.goals, classes: state.classes, dailyTasks: state.dailyTasks,\n    journal: state.journal, countdowns: state.countdowns,\n    habits: state.habits, reminders: state.reminders, brainDump: state.brainDump,\n    profile: state.profile,\n  }));\n}\n\nfunction uid() { return Math.random().toString(36).slice(2,9); }\n\n// \u2500\u2500 DATE UTILS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction getMonday(d) {\n  const dt = new Date(d);\n  const day = dt.getDay();\n  dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));\n  dt.setHours(0,0,0,0);\n  return dt;\n}\n\nfunction getWeekDates() {\n  const monday = getMonday(new Date());\n  monday.setDate(monday.getDate() + state.weekOffset * 7);\n  return DAYS.map((_, i) => {\n    const d = new Date(monday);\n    d.setDate(d.getDate() + i);\n    return d;\n  });\n}\n\nfunction isToday(date) {\n  const t = new Date();\n  return date.getDate()===t.getDate() && date.getMonth()===t.getMonth() && date.getFullYear()===t.getFullYear();\n}\n\nfunction fmt(t) {\n  if (!t) return '';\n  const [h, m] = t.split(':').map(Number);\n  return `${h%12||12}:${m.toString().padStart(2,'0')} ${h>=12?'PM':'AM'}`;\n}\n\nfunction esc(s) {\n  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');\n}\n\n// \u2500\u2500 RENDER PROFILE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderProfile() {\n  const p = state.profile;\n  const avatarEl  = document.getElementById('avatarEl');\n  const avatarTxt = document.getElementById('avatarText');\n  document.getElementById('profileName').textContent = p.name || 'Set your name';\n  document.getElementById('profileSub').textContent  = p.name ? 'Click to edit' : 'Click to set up';\n  document.getElementById('quoteBox').textContent    = p.quote || 'Click to add a quote\u2026';\n\n  if (p.emoji) {\n    avatarTxt.textContent = p.emoji;\n    avatarEl.style.background = 'var(--burg-xs)';\n    avatarEl.style.fontSize = '20px';\n  } else if (p.name) {\n    avatarTxt.textContent = p.name[0].toUpperCase();\n    avatarEl.style.background = 'var(--burg)';\n    avatarEl.style.fontSize = '16px';\n  } else {\n    avatarTxt.textContent = '?';\n    avatarEl.style.background = 'var(--burg)';\n    avatarEl.style.fontSize = '16px';\n  }\n}\n\n// \u2500\u2500 RENDER WEEK \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderWeek() {\n  const dates = getWeekDates();\n  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  const s = dates[0], e = dates[6];\n  const label = s.getMonth()===e.getMonth()\n    ? `${s.getDate()}\u2013${e.getDate()} ${monthNames[s.getMonth()]} ${s.getFullYear()}`\n    : `${s.getDate()} ${monthNames[s.getMonth()]} \u2013 ${e.getDate()} ${monthNames[e.getMonth()]} ${e.getFullYear()}`;\n  document.getElementById('weekLabel').textContent = label;\n\n  const grid = document.getElementById('weekGrid');\n  grid.innerHTML = '';\n\n  DAYS.forEach((day, i) => {\n    const date = dates[i];\n    const col = document.createElement('div');\n    col.className = 'day-col';\n\n    const hdr = document.createElement('div');\n    hdr.className = 'day-header';\n\n    const dateNum = document.createElement('div');\n    dateNum.className = 'day-date-num' + (isToday(date) ? ' today' : '');\n    dateNum.textContent = date.getDate();\n\n    hdr.innerHTML = `<span class=\"day-name\">${day.slice(0,3)}</span>`;\n    hdr.appendChild(dateNum);\n\n    const addBtn = document.createElement('button');\n    addBtn.className = 'day-add-btn';\n    addBtn.textContent = '+';\n    addBtn.title = `Add event on ${day}`;\n    addBtn.onclick = () => openAddModal(day);\n    hdr.appendChild(addBtn);\n    col.appendChild(hdr);\n\n    const dayEvents = state.events\n      .filter(e => e.day === day)\n      .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));\n\n    if (dayEvents.length === 0) {\n      const emp = document.createElement('div');\n      emp.className = 'day-empty';\n      emp.textContent = '\u2014';\n      col.appendChild(emp);\n    } else {\n      dayEvents.forEach(ev => {\n        const c = COLORS.find(x => x.id === ev.color) || COLORS[0];\n        const card = document.createElement('div');\n        card.className = 'event-card';\n        card.style.background = c.bg;\n        card.style.borderLeftColor = c.border;\n        card.innerHTML = `\n          <div class=\"event-card-name\">${esc(ev.title)}</div>\n          <div class=\"event-card-time\">${fmt(ev.startTime)}${ev.endTime?' \u2013 '+fmt(ev.endTime):''}</div>\n        `;\n        card.onclick = () => openEditModal(ev.id);\n        col.appendChild(card);\n      });\n    }\n    grid.appendChild(col);\n  });\n\n  // Sync mini cal to highlight correct week\n  renderMiniCal();\n  renderLessonPlanSummary();\n}\n\n// \u2500\u2500 MINI CALENDAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction prevMiniCalMonth() {\n  mcDate = new Date(mcDate.getFullYear(), mcDate.getMonth() - 1, 1);\n  renderMiniCal();\n}\n\nfunction nextMiniCalMonth() {\n  mcDate = new Date(mcDate.getFullYear(), mcDate.getMonth() + 1, 1);\n  renderMiniCal();\n}\n\nfunction renderMiniCal() {\n  const year  = mcDate.getFullYear();\n  const month = mcDate.getMonth();\n  const MONTH_NAMES = ['January','February','March','April','May','June',\n                       'July','August','September','October','November','December'];\n\n  document.getElementById('mcMonthLabel').textContent = `${MONTH_NAMES[month].slice(0,3)} ${year}`;\n\n  const grid = document.getElementById('mcGrid');\n  grid.innerHTML = '';\n\n  const firstDay   = new Date(year, month, 1);\n  const startDow   = (firstDay.getDay() + 6) % 7; // 0=Mon\n  const daysInMonth = new Date(year, month + 1, 0).getDate();\n  const today       = new Date();\n\n  // Current view week start/end for highlighting\n  const viewDates  = getWeekDates();\n  const viewMon    = viewDates[0];\n  const viewSun    = viewDates[6];\n\n  // Build weeks (7 cells each = one row)\n  let cells = [];\n  for (let i = 0; i < startDow; i++) cells.push(null);\n  for (let d = 1; d <= daysInMonth; d++) cells.push(d);\n  while (cells.length % 7 !== 0) cells.push(null);\n\n  // Group into weeks and render\n  for (let w = 0; w < cells.length / 7; w++) {\n    const week = cells.slice(w * 7, w * 7 + 7);\n\n    // Is this the row containing the currently viewed week?\n    const rowInView = week.some(d => {\n      if (!d) return false;\n      const dt = new Date(year, month, d);\n      return dt >= viewMon && dt <= viewSun;\n    });\n\n    week.forEach((d, di) => {\n      const cell = document.createElement('div');\n      cell.className = 'mc-cell';\n\n      if (!d) {\n        cell.classList.add('mc-empty');\n      } else {\n        const dt = new Date(year, month, d);\n        const dayName = DAYS[(dt.getDay() + 6) % 7];\n        const hasEv   = state.events.some(e => e.day === dayName);\n        const todayCell = dt.toDateString() === today.toDateString();\n\n        if (rowInView) cell.classList.add('mc-in-view-cell');\n        if (todayCell) cell.classList.add('mc-today');\n\n        cell.innerHTML = `<span>${d}</span>`;\n        if (hasEv) {\n          const dot = document.createElement('div');\n          dot.className = 'mc-dot';\n          cell.appendChild(dot);\n        }\n        cell.onclick = () => jumpToDate(new Date(year, month, d));\n      }\n\n      grid.appendChild(cell);\n    });\n\n    // Highlight the whole row by styling cells if in-view\n    if (rowInView) {\n      const start = w * 7;\n      const rowCells = grid.children;\n      for (let i = start; i < start + 7 && i < rowCells.length; i++) {\n        if (!rowCells[i].classList.contains('mc-empty')) {\n          rowCells[i].style.background = 'var(--burg-xs)';\n        }\n      }\n    }\n  }\n}\n\nfunction jumpToDate(date) {\n  const today    = new Date(); today.setHours(0,0,0,0);\n  const thisMon  = getMonday(today);\n  const targetMon = getMonday(date);\n  const diff = Math.round((targetMon - thisMon) / (7*24*60*60*1000));\n  state.weekOffset = diff;\n  renderWeek();\n}\n\n// \u2500\u2500 LESSON PLAN SUMMARY (sidebar) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderLessonPlanSummary() {\n  const lp = document.getElementById('lpSection');\n  lp.innerHTML = '';\n\n  const shortDays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];\n  DAYS.forEach((day, i) => {\n    const evs = state.events.filter(e => e.day === day)\n      .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));\n\n    const row = document.createElement('div');\n    row.className = 'lp-day-row';\n\n    const label = document.createElement('div');\n    label.className = 'lp-day-label';\n    label.textContent = shortDays[i];\n    row.appendChild(label);\n\n    const chips = document.createElement('div');\n    chips.className = 'lp-events';\n\n    if (evs.length === 0) {\n      const emp = document.createElement('div');\n      emp.className = 'lp-empty';\n      emp.textContent = 'free';\n      chips.appendChild(emp);\n    } else {\n      evs.forEach(ev => {\n        const chip = document.createElement('div');\n        chip.className = 'lp-event-chip';\n        chip.style.background = COLOR_BG_HEX[ev.color] || '#C2DAED';\n        chip.textContent = ev.title;\n        chip.title = `${ev.title}${ev.startTime?' \u00b7 '+fmt(ev.startTime):''}${ev.endTime?' \u2013 '+fmt(ev.endTime):''}`;\n        chip.onclick = () => openEditModal(ev.id);\n        chips.appendChild(chip);\n      });\n    }\n\n    row.appendChild(chips);\n    lp.appendChild(row);\n  });\n}\n\n// \u2500\u2500 MONTH PICKER POPUP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet pickerOpen = false;\n\nfunction toggleMonthPicker() {\n  pickerOpen = !pickerOpen;\n  const popup = document.getElementById('monthPickerPopup');\n  popup.classList.toggle('open', pickerOpen);\n  document.getElementById('weekLabelBtn').classList.toggle('active', pickerOpen);\n  if (pickerOpen) renderMonthPicker();\n}\n\nfunction closeMonthPicker() {\n  pickerOpen = false;\n  document.getElementById('monthPickerPopup').classList.remove('open');\n  document.getElementById('weekLabelBtn').classList.remove('active');\n}\n\nfunction prevPickerMonth(e) {\n  e.stopPropagation();\n  mpDate = new Date(mpDate.getFullYear(), mpDate.getMonth() - 1, 1);\n  renderMonthPicker();\n}\n\nfunction nextPickerMonth(e) {\n  e.stopPropagation();\n  mpDate = new Date(mpDate.getFullYear(), mpDate.getMonth() + 1, 1);\n  renderMonthPicker();\n}\n\nfunction renderMonthPicker() {\n  const year  = mpDate.getFullYear();\n  const month = mpDate.getMonth();\n  const MONTHS = ['January','February','March','April','May','June',\n                  'July','August','September','October','November','December'];\n\n  document.getElementById('mpLabel').textContent = MONTHS[month];\n  document.getElementById('mpYearLabel').textContent = year;\n\n  const grid  = document.getElementById('mpGrid');\n  grid.innerHTML = '';\n\n  const firstDay    = new Date(year, month, 1);\n  const startDow    = (firstDay.getDay() + 6) % 7;\n  const daysInMonth = new Date(year, month + 1, 0).getDate();\n  const today       = new Date();\n\n  const viewDates = getWeekDates();\n  const viewMon   = viewDates[0];\n  const viewSun   = viewDates[6];\n\n  let cells = [];\n  for (let i = 0; i < startDow; i++) cells.push({ d: null });\n  for (let d = 1; d <= daysInMonth; d++) cells.push({ d, inMonth: true });\n  while (cells.length % 7 !== 0) cells.push({ d: null });\n\n  // Build week rows\n  for (let w = 0; w < cells.length / 7; w++) {\n    const week = cells.slice(w*7, w*7+7);\n    const rowInView = week.some(({ d }) => {\n      if (!d) return false;\n      const dt = new Date(year, month, d);\n      return dt >= viewMon && dt <= viewSun;\n    });\n\n    week.forEach(({ d, inMonth }) => {\n      con
