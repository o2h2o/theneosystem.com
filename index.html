st cell = document.createElement('div');\n      cell.className = 'mp-cell';\n\n      if (!d) {\n        cell.classList.add('empty');\n      } else {\n        const dt = new Date(year, month, d);\n        const dayName = DAYS[(dt.getDay() + 6) % 7];\n        const hasEv   = state.events.some(e => e.day === dayName);\n        const isT     = dt.toDateString() === today.toDateString();\n\n        if (!inMonth) cell.classList.add('other-month');\n        if (isT)      cell.classList.add('mp-today');\n        if (hasEv)    cell.classList.add('has-events');\n        if (rowInView) cell.style.background = 'var(--burg-xs)';\n\n        cell.textContent = d;\n        cell.onclick = (e) => {\n          e.stopPropagation();\n          jumpToDate(new Date(year, month, d));\n          // Sync mini cal month to match\n          mcDate = new Date(year, month, 1);\n          renderMiniCal();\n          closeMonthPicker();\n        };\n      }\n\n      grid.appendChild(cell);\n    });\n  }\n}\n\n// Close picker when clicking outside\ndocument.addEventListener('click', e => {\n  if (pickerOpen && !document.getElementById('weekNav').contains(e.target)) {\n    closeMonthPicker();\n  }\n});\n\n// \u2500\u2500 TASKS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderTasks() {\n  const grid = document.getElementById('taskGrid');\n  grid.innerHTML = '';\n\n  const active = state.tasks.filter(t => !t.completed);\n  const done   = state.tasks.filter(t =>  t.completed);\n  document.getElementById('tasksCount').textContent = active.length;\n\n  if (state.tasks.length === 0) {\n    grid.innerHTML = `<div style=\"color:var(--muted);font-size:13px;padding:20px 0;font-style:italic;text-align:center;grid-column:1/-1\">No tasks yet. Click \"+ New task\" to add one.</div>`;\n    return;\n  }\n\n  [...active, ...done].forEach(task => {\n    const div = document.createElement('div');\n    div.className = 'big-task-item' + (task.completed ? ' done-item' : '');\n\n    const cb = document.createElement('input');\n    cb.type = 'checkbox';\n    cb.checked = task.completed;\n    cb.onchange = () => { task.completed = cb.checked; save(); renderTasks(); };\n\n    const body = document.createElement('div');\n    body.className = 'big-task-body';\n\n    const name = document.createElement('div');\n    name.className = 'big-task-name' + (task.completed ? ' done' : '');\n    name.textContent = task.title;\n\n    const meta = document.createElement('div');\n    meta.className = 'big-task-meta';\n\n    const ptag = document.createElement('span');\n    ptag.className = `priority-tag p-${task.priority}`;\n    ptag.textContent = { high:'High', medium:'Medium', low:'Low', exam:'Exam' }[task.priority] || task.priority;\n    meta.appendChild(ptag);\n\n    if (task.due) {\n      const dtag = document.createElement('span');\n      dtag.className = 'due-date-tag';\n      dtag.textContent = new Date(task.due + 'T00:00').toLocaleDateString('en-AU', { day:'numeric', month:'short' });\n      meta.appendChild(dtag);\n    }\n\n    body.appendChild(name);\n    body.appendChild(meta);\n\n    const del = document.createElement('button');\n    del.className = 'big-task-del';\n    del.textContent = '\u00d7';\n    del.onclick = () => { state.tasks = state.tasks.filter(t => t.id !== task.id); save(); renderTasks(); };\n\n    div.appendChild(cb);\n    div.appendChild(body);\n    div.appendChild(del);\n    grid.appendChild(div);\n  });\n}\n\nfunction renderSideTasks() {\n  const list = document.getElementById('sideTaskList');\n  list.innerHTML = '';\n  state.sideTasks.forEach(t => {\n    const item = document.createElement('div');\n    item.className = 'task-item';\n    const cb = document.createElement('input');\n    cb.type = 'checkbox'; cb.checked = t.done;\n    cb.onchange = () => { t.done = cb.checked; save(); renderSideTasks(); };\n    const txt = document.createElement('span');\n    txt.className = 'task-text' + (t.done ? ' done' : '');\n    txt.textContent = t.text;\n    const del = document.createElement('button');\n    del.className = 'task-delete'; del.textContent = '\u00d7';\n    del.onclick = () => { state.sideTasks = state.sideTasks.filter(x => x.id !== t.id); save(); renderSideTasks(); };\n    item.appendChild(cb); item.appendChild(txt); item.appendChild(del);\n    list.appendChild(item);\n  });\n}\n\nfunction addSideTask() {\n  const inp = document.getElementById('sideTaskInput');\n  const text = inp.value.trim();\n  if (!text) return;\n  state.sideTasks.push({ id: uid(), text, done: false });\n  inp.value = '';\n  save(); renderSideTasks();\n}\n\n// \u2500\u2500 EVENT MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction buildColorPicker() {\n  const picker = document.getElementById('evColorPicker');\n  picker.innerHTML = '';\n  COLORS.forEach(c => {\n    const sw = document.createElement('div');\n    sw.className = 'color-swatch' + (c.id === selectedColor ? ' selected' : '');\n    sw.style.background = c.bg;\n    sw.title = c.id;\n    sw.onclick = () => { selectedColor = c.id; buildColorPicker(); };\n    picker.appendChild(sw);\n  });\n}\n\nfunction openAddModal(day) {\n  editingEventId = null;\n  selectedColor = 'blue';\n  document.getElementById('eventModalTitle').textContent = 'Add Event';\n  document.getElementById('evTitle').value = '';\n  document.getElementById('evDay').value = day || 'Monday';\n  document.getElementById('evStart').value = '';\n  document.getElementById('evEnd').value = '';\n  buildColorPicker();\n  document.getElementById('eventModalActions').innerHTML = `\n    <button class=\"btn-ghost\" onclick=\"closeEventModal()\">Cancel</button>\n    <button class=\"btn-primary\" onclick=\"saveEvent()\">Save</button>\n  `;\n  document.getElementById('eventModal').classList.add('open');\n  setTimeout(() => document.getElementById('evTitle').focus(), 50);\n}\n\nfunction openEditModal(id) {\n  const ev = state.events.find(e => e.id === id);\n  if (!ev) return;\n  editingEventId = id;\n  selectedColor = ev.color || 'blue';\n  document.getElementById('eventModalTitle').textContent = 'Edit Event';\n  document.getElementById('evTitle').value = ev.title;\n  document.getElementById('evDay').value = ev.day;\n  document.getElementById('evStart').value = ev.startTime || '';\n  document.getElementById('evEnd').value = ev.endTime || '';\n  buildColorPicker();\n  document.getElementById('eventModalActions').innerHTML = `\n    <button class=\"btn-danger\" onclick=\"deleteEvent('${id}')\">Delete</button>\n    <div style=\"display:flex;gap:8px\">\n      <button class=\"btn-ghost\" onclick=\"closeEventModal()\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveEvent()\">Save</button>\n    </div>\n  `;\n  document.getElementById('eventModal').classList.add('open');\n  setTimeout(() => document.getElementById('evTitle').focus(), 50);\n}\n\nfunction closeEventModal() {\n  document.getElementById('eventModal').classList.remove('open');\n  editingEventId = null;\n}\n\nfunction saveEvent() {\n  const title = document.getElementById('evTitle').value.trim();\n  if (!title) { document.getElementById('evTitle').focus(); return; }\n  const ev = {\n    id: editingEventId || uid(),\n    title,\n    day:       document.getElementById('evDay').value,\n    startTime: document.getElementById('evStart').value,\n    endTime:   document.getElementById('evEnd').value,\n    color:     selectedColor,\n  };\n  if (editingEventId) {\n    const idx = state.events.findIndex(e => e.id === editingEventId);\n    if (idx !== -1) state.events[idx] = ev;\n  } else {\n    state.events.push(ev);\n  }\n  save(); renderWeek(); closeEventModal();\n}\n\nfunction deleteEvent(id) {\n  state.events = state.events.filter(e => e.id !== id);\n  save(); renderWeek(); closeEventModal();\n}\n\n// \u2500\u2500 TASK MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction openTaskModal() {\n  document.getElementById('tkTitle').value = '';\n  document.getElementById('tkPriority').value = 'medium';\n  document.getElementById('tkDue').value = '';\n  document.getElementById('taskModal').classList.add('open');\n  setTimeout(() => document.getElementById('tkTitle').focus(), 50);\n}\n\nfunction closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }\n\nfunction saveTask() {\n  const title = document.getElementById('tkTitle').value.trim();\n  if (!title) { document.getElementById('tkTitle').focus(); return; }\n  state.tasks.push({\n    id: uid(), title,\n    priority: document.getElementById('tkPriority').value,\n    due: document.getElementById('tkDue').value,\n    completed: false,\n  });\n  save(); renderTasks(); closeTaskModal();\n}\n\n// \u2500\u2500 PROFILE MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction openProfileModal() {\n  document.getElementById('profileNameInput').value = state.profile.name || '';\n  document.getElementById('profileEmoji').value = state.profile.emoji || '';\n  document.getElementById('profileQuote').value = state.profile.quote || '';\n  document.getElementById('profileModal').classList.add('open');\n}\n\nfunction saveProfile() {\n  state.profile.name  = document.getElementById('profileNameInput').value.trim();\n  state.profile.emoji = document.getElementById('profileEmoji').value.trim();\n  state.profile.quote = document.getElementById('profileQuote').value.trim();\n  save(); renderProfile(); closeModal('profileModal');\n}\n\nfunction openModal(id) { document.getElementById(id).classList.add('open'); }\nfunction closeModal(id) { document.getElementById(id).classList.remove('open'); }\n\n// \u2500\u2500 KEYBOARD & EVENTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape') {\n    document.querySelectorAll('.modal-backdrop.open').forEach(el => el.classList.remove('open'));\n    closeMonthPicker();\n  }\n  // Arrow keys to flip weeks when no modal open\n  if (!document.querySelector('.modal-backdrop.open') && !pickerOpen) {\n    if (e.key === 'ArrowLeft')  { state.weekOffset--; renderWeek(); }\n    if (e.key === 'ArrowRight') { state.weekOffset++; renderWeek(); }\n  }\n});\n\ndocument.getElementById('sideTaskInput').addEventListener('keydown', e => {\n  if (e.key === 'Enter') addSideTask();\n});\n\ndocument.querySelectorAll('.modal-backdrop').forEach(b => {\n  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });\n});\n\n// \u2500\u2500 WEEK NAV \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndocument.getElementById('prevWeek').onclick = () => { state.weekOffset--; renderWeek(); };\ndocument.getElementById('nextWeek').onclick = () => { state.weekOffset++; renderWeek(); };\ndocument.getElementById('todayBtn').onclick = () => {\n  state.weekOffset = 0;\n  mpDate = new Date(); mpDate.setDate(1);\n  mcDate = new Date(); mcDate.setDate(1);\n  renderWeek();\n};\n\n// \u2500\u2500 FULL CALENDAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet calPanelDate = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();\nlet editingCalEventId = null;\nlet calSelectedColor = 'blue';\n\nconst MONTH_NAMES_FULL = ['January','February','March','April','May','June',\n                          'July','August','September','October','November','December'];\n\nfunction prevCalPanelMonth() {\n  calPanelDate = new Date(calPanelDate.getFullYear(), calPanelDate.getMonth() - 1, 1);\n  renderCalPanel();\n}\nfunction nextCalPanelMonth() {\n  calPanelDate = new Date(calPanelDate.getFullYear(), calPanelDate.getMonth() + 1, 1);\n  renderCalPanel();\n}\nfunction calPanelToday() {\n  calPanelDate = new Date(); calPanelDate.setDate(1); calPanelDate.setHours(0,0,0,0);\n  renderCalPanel();\n}\n\nfunction renderCalPanel() {\n  const year  = calPanelDate.getFullYear();\n  const month = calPanelDate.getMonth();\n  document.getElementById('calPanelLabel').textContent =\n    `${MONTH_NAMES_FULL[month]} ${year}`;\n\n  const grid  = document.getElementById('calGrid');\n  grid.innerHTML = '';\n\n  const today     = new Date(); today.setHours(0,0,0,0);\n  const firstDay  = new Date(year, month, 1);\n  const startDow  = (firstDay.getDay() + 6) % 7; // 0=Mon\n  const daysInMonth = new Date(year, month + 1, 0).getDate();\n\n  // Prev-month tail\n  const prevDays = new Date(year, month, 0).getDate();\n  for (let i = startDow - 1; i >= 0; i--) {\n    grid.appendChild(buildCalCell(new Date(year, month - 1, prevDays - i), true));\n  }\n  // This month\n  for (let d = 1; d <= daysInMonth; d++) {\n    grid.appendChild(buildCalCell(new Date(year, month, d), false));\n  }\n  // Next-month filler to complete the last row\n  const total = startDow + daysInMonth;\n  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);\n  for (let d = 1; d <= remainder; d++) {\n    grid.appendChild(buildCalCell(new Date(year, month + 1, d), true));\n  }\n}\n\nfunction dateKey(d) {\n  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n}\n\nfunction buildCalCell(date, otherMonth) {\n  const key    = dateKey(date);\n  const today  = new Date(); today.setHours(0,0,0,0);\n  const isToday2 = date.getTime() === today.getTime();\n\n  const cell = document.createElement('div');\n  cell.className = 'cal-cell' +\n    (otherMonth ? ' other-month' : '') +\n    (isToday2   ? ' cal-today'   : '');\n  cell.onclick = () => openCalEventModal(key);\n\n  // Date number\n  const num = document.createElement('div');\n  num.className = 'cal-cell-num';\n  num.textContent = date.getDate();\n  cell.appendChild(num);\n\n  // Events for this date\n  const evs = (state.calEvents || [])\n    .filter(e => e.date === key)\n    .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));\n\n  const MAX_SHOW = 3;\n  evs.slice(0, MAX_SHOW).forEach(ev => {\n    const chip = document.createElement('div');\n    chip.className = 'cal-event-chip';\n    chip.style.background = COLOR_BG_HEX[ev.color] || '#C2DAED';\n    chip.textContent = (ev.startTime ? fmt(ev.startTime) + ' ' : '') + ev.title;\n    chip.title = ev.note || ev.title;\n    chip.onclick = (e) => { e.stopPropagation(); openCalEventEdit(ev.id); };\n    cell.appendChild(chip);\n  });\n  if (evs.length > MAX_SHOW) {\n    const more = document.createElement('div');\n    more.className = 'cal-more';\n    more.textContent = `+${evs.length - MAX_SHOW} more`;\n    cell.appendChild(more);\n  }\n\n  return cell;\n}\n\nfunction buildCalColorPicker(pickerId, selected) {\n  const picker = document.getElementById(pickerId);\n  picker.innerHTML = '';\n  COLORS.forEach(c => {\n    const sw = document.createElement('div');\n    sw.className = 'color-swatch' + (c.id === selected ? ' selected' : '');\n    sw.style.background = c.bg;\n    sw.title = c.id;\n    sw.onclick = () => { calSelectedColor = c.id; buildCalColorPicker(pickerId, c.id); };\n    picker.appendChild(sw);\n  });\n}\n\nfunction openCalEventModal(dateStr) {\n  editingCalEventId = null;\n  calSelectedColor = 'yellow';\n  document.getElementById('calEventModalTitle').textContent = 'Add to Calendar';\n  document.getElementById('ceDate').value = dateStr;\n  document.getElementById('ceTitle').value = '';\n  document.getElementById('ceStart').value = '';\n  document.getElementById('ceEnd').value = '';\n  document.getElementById('ceNote').value = '';\n  buildCalColorPicker('ceColorPicker', calSelectedColor);\n  document.getElementById('calEventModalActions').innerHTML = `\n    <button class=\"btn-ghost\" onclick=\"closeCalEventModal()\">Cancel</button>\n    <button class=\"btn-primary\" onclick=\"saveCalEvent()\">Save</button>\n  `;\n  document.getElementById('calEventModal').classList.add('open');\n  setTimeout(() => document.getElementById('ceTitle').focus(), 50);\n}\n\nfunction openCalEventEdit(id) {\n  const ev = (state.calEvents || []).find(e => e.id === id);\n  if (!ev) return;\n  editingCalEventId = id;\n  calSelectedColor = ev.color || 'yellow';\n  document.getElementById('calEventModalTitle').textContent = 'Edit Calendar Event';\n  document.getElementById('ceDate').value = ev.date;\n  document.getElementById('ceTitle').value = ev.title;\n  document.getElementById('ceStart').value = ev.startTime || '';\n  document.getElementById('ceEnd').value = ev.endTime || '';\n  document.getElementById('ceNote').value = ev.note || '';\n  buildCalColorPicker('ceColorPicker', calSelectedColor);\n  document.getElementById('calEventModalActions').innerHTML = `\n    <button class=\"btn-danger\" onclick=\"deleteCalEvent('${id}')\">Delete</button>\n    <div style=\"display:flex;gap:8px\">\n      <button class=\"btn-ghost\" onclick=\"closeCalEventModal()\">Cancel</button>\n      <button class=\"btn-primary\" onclick=\"saveCalEvent()\">Save</button>\n    </div>\n  `;\n  document.getElementById('calEventModal').classList.add('open');\n  setTimeout(() => document.getElementById('ceTitle').focus(), 50);\n}\n\nfunction closeCalEventModal() {\n  document.getElementById('calEventModal').classList.remove('open');\n  editingCalEventId = null;\n}\n\nfunction saveCalEvent() {\n  const title = document.getElementById('ceTitle').value.trim();\n  if (!title) { document.getElementById('ceTitle').focus(); return; }\n  if (!state.calEvents) state.calEvents = [];\n\n  const ev = {\n    id:        editingCalEventId || uid(),\n    date:      document.getElementById('ceDate').value,\n    title,\n    startTime: document.getElementById('ceStart').value,\n    endTime:   document.getElementById('ceEnd').value,\n    color:     calSelectedColor,\n    note:      document.getElementById('ceNote').value.trim(),\n  };\n\n  if (editingCalEventId) {\n    const idx = state.calEvents.findIndex(e => e.id === editingCalEventId);\n    if (idx !== -1) state.calEvents[idx] = ev;\n  } else {\n    state.calEvents.push(ev);\n  }\n  save(); renderCalPanel(); closeCalEventModal();\n}\n\nfunction deleteCalEvent(id) {\n  state.calEvents = (state.calEvents || []).filter(e => e.id !== id);\n  save(); renderCalPanel(); closeCalEventModal();\n}\n\n// \u2500\u2500 MOTIVATIONAL PHOTO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderMotPhoto() {\n  const img = document.getElementById('motPhotoImg');\n  const placeholder = document.getElementById('motPhotoPlaceholder');\n  const overlay = document.getElementById('motOverlay');\n  const caption = document.getElementById('motCaption');\n  const captionInput = document.getElementById('motCaptionInput');\n\n  if (state.profile.motPhoto) {\n    img.src = state.profile.motPhoto;\n    img.style.display = 'block';\n    placeholder.style.display = 'none';\n    // Only show Change/Remove overlay when photo exists\n    overlay.innerHTML = `\n      <button class=\"mot-overlay-btn\" onclick=\"triggerPhotoUpload(event)\">Change</button>\n      <button class=\"mot-overlay-btn danger\" onclick=\"removePhoto(event)\">Remove</button>\n    `;\n  } else {\n    img.style.display = 'none';\n    img.src = '';\n    placeholder.style.display = 'flex';\n    overlay.innerHTML = '';\n  }\n\n  const cap = state.profile.motCaption || '';\n  captionInput.style.display = 'none';\n  if (cap) {\n    caption.textContent = cap;\n    caption.style.display = 'block';\n  } else if (state.profile.motPhoto) {\n    caption.textContent = 'Add a caption\u2026';\n    caption.style.display = 'block';\n    caption.style.opacity = '0.45';\n  } else {\n    caption.style.display = 'none';\n  }\n}\n\nfunction motPhotoClick(e) {\n  // If no photo yet, open file picker on wrap click\n  if (!state.profile.motPhoto) triggerPhotoUpload(e);\n}\n\nfunction triggerPhotoUpload(e) {\n  e.stopPropagation();\n  document.getElementById('motFileInput').click();\n}\n\nfunction handlePhotoFile(e) {\n  const file = e.target.files[0];\n  if (!file) return;\n  e.target.value = ''; // reset so same file can be re-picked\n\n  const reader = new FileReader();\n  reader.onload = (ev) => {\n    const dataUrl = ev.target.result;\n    // Compress via canvas \u2014 max 600px wide, JPEG 0.75\n    const image = new Image();\n    image.onload = () => {\n      const MAX = 600;\n      let w = image.width, h = image.height;\n      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }\n      const canvas = document.createElement('canvas');\n      canvas.width = w; canvas.height = h;\n      canvas.getContext('2d').drawImage(image, 0, 0, w, h);\n      state.profile.motPhoto = canvas.toDataURL('image/jpeg', 0.75);\n      save();\n      renderMotPhoto();\n    };\n    image.src = dataUrl;\n  };\n  reader.readAsDataURL(file);\n}\n\nfunction removePhoto(e) {\n  e.stopPropagation();\n  state.profile.motPhoto = '';\n  state.profile.motCaption = '';\n  save();\n  renderMotPhoto();\n}\n\nfunction editCaption() {\n  const caption = document.getElementById('motCaption');\n  const input = document.getElementById('motCaptionInput');\n  input.value = state.profile.motCaption || '';\n  caption.style.display = 'none';\n  input.style.display = 'block';\n  input.focus();\n  input.select();\n}\n\nfunction saveCaption() {\n  const input = document.getElementById('motCaptionInput');\n  state.profile.motCaption = input.value.trim();\n  save();\n  renderMotPhoto();\n}\n\n// \u2500\u2500 SIDEBAR TOGGLE (mobile) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction toggleSidebar() {\n  const sb = document.getElementById('sidebarEl');\n  const btn = document.getElementById('sidebarToggle');\n  const isOpen = sb.classList.toggle('open');\n  btn.classList.toggle('open', isOpen);\n}\n\n// \u2500\u2500 DAILY TASKS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet dailyDate = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();\n\nconst DAILY_DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\nconst DAILY_MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n\nfunction dailyDateKey(d) {\n  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n}\n\nfunction renderDailyPanel() {\n  const key = dailyDateKey(dailyDate);\n  const today = dailyDateKey(new Date());\n  const isToday = key === today;\n\n  // Label\n  const label = document.getElementById('dailyDateLabel');\n  label.textContent = DAILY_DAY_NAMES[dailyDate.getDay()] + ' ' + dailyDate.getDate() + ' ' + DAILY_MONTH_NAMES[dailyDate.getMonth()];\n  label.style.color = isToday ? 'var(--burg)' : 'var(--text)';\n\n  const tasks = (state.dailyTasks || []).filter(t => t.date === key);\n  const doneCount = tasks.filter(t => t.done).length;\n\n  // Count badge\n  const badge = document.getElementById('dailyCount');\n  badge.textContent = tasks.length;\n  badge.style.display = tasks.length ? '' : 'none';\n\n  const list = document.getElementById('dailyTaskList');\n  if (!tasks.length) {\n    list.innerHTML = '<div class=\"daily-empty\">No tasks for this day.</div>';\n    return;\n  }\n\n  list.innerHTML = '';\n  tasks.forEach(task => {\n    const row = document.createElement('div');\n    row.className = 'daily-task-row';\n\n    const cb = document.createElement('input');\n    cb.type = 'checkbox';\n    cb.checked = task.done;\n    cb.onchange = () => { task.done = cb.checked; save(); renderDailyPanel(); };\n\n    const txt = document.createElement('span');\n    txt.className = 'daily-task-text' + (task.done ? ' done' : '');\n    txt.textContent = task.text;\n\n    const del = document.createElement('button');\n    del.className = 'daily-task-del';\n    del.textContent = '\u00d7';\n    del.title = 'Delete';\n    del.onclick = () => {\n      state.dailyTasks = state.dailyTasks.filter(t => t.id !== task.id);\n      save(); renderDailyPanel();\n    };\n\n    row.append(cb, txt, del);\n    list.appendChild(row);\n  });\n}\n\nfunction addDailyTask() {\n  const inp = document.getElementById('dailyTaskInput');\n  const text = inp.value.trim();\n  if (!text) return;\n  if (!state.dailyTasks) state.dailyTasks = [];\n  state.dailyTasks.push({ id: uid(), date: dailyDateKey(dailyDate), text, done: false });\n  inp.value = '';\n  save(); renderDailyPanel();\n  inp.focus();\n}\n\nfunction shiftDailyDate(delta) {\n  dailyDate = new Date(dailyDate);\n  dailyDate.setDate(dailyDate.getDate() + delta);\n  renderDailyPanel();\n}\n\nfunction goTodayDaily() {\n  dailyDate = new Date();\n  dailyDate.setHours(0,0,0,0);\n  renderDailyPanel();\n}\n\nlet dpDate = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();\nlet dpOpen = false;\n\nfunction toggleDailyPicker(e) {\n  if (e) e.stopPropagation();\n  const popup = document.getElementById('dailyPickerPopup');\n  const panel = document.querySelector('.daily-panel');\n  dpOpen = !dpOpen;\n  if (dpOpen) {\n    dpDate = new Date(dailyDate.getFullYear(), dailyDate.getMonth(), 1);\n    renderDailyPicker();\n    popup.classList.add('open');\n    if (panel) panel.style.overflow = 'visible';\n  } else {\n    popup.classList.remove('open');\n    if (panel) panel.style.overflow = '';\n  }\n}\n\nfunction shiftDailyPickerMonth(delta, e) {\n  if (e) e.stopPropagation();\n  dpDate = new Date(dpDate.getFullYear(), dpDate.getMonth() + delta, 1);\n  renderDailyPicker();\n}\n\nfunction renderDailyPicker() {\n  const MONTHS = ['January','February','March','April','May','June',\n                  'July','August','September','October','November','December'];\n  const year  = dpDate.getFullYear();\n  const month = dpDate.getMonth();\n  const today = new Date();\n  const selKey = dailyDateKey(dailyDate);\n\n  document.getElementById('dpLabel').textContent     = MONTHS[month];\n  document.getElementById('dpYearLabel').textContent = year;\n\n  const grid = document.getElementById('dpGrid');\n  grid.innerHTML = '';\n\n  const startDow    = (new Date(year, month, 1).getDay() + 6) % 7;\n  const daysInMonth = new Date(year, month + 1, 0).getDate();\n\n  let cells = [];\n  for (let i = 0; i < startDow; i++) cells.push(null);\n  for (let d = 1; d <= daysInMonth; d++) cells.push(d);\n  while (cells.length % 7 !== 0) cells.push(null);\n\n  cells.forEach(d => {\n    const cell = document.createElement('div');\n    cell.className = 'mp-cell';\n    if (!d) {\n      cell.classList.add('empty');\n    } else {\n      const dt     = new Date(year, month, d);\n      const key    = dailyDateKey(dt);\n      const isT    = dt.toDateString() === today.toDateString();\n      const isSel  = key === selKey;\n      const hasTasks = (state.dailyTasks || []).some(t => t.date === key);\n\n      if (isT)      cell.classList.add('mp-today');\n      if (hasTasks) cell.classList.add('has-events');\n      if (isSel) {\n        cell.style.background   = 'var(--burg)';\n        cell.style.color        = 'white';\n        cell.style.borderRadius = '5px';\n        cell.style.fontWeight   = '700';\n      }\n\n      cell.textContent = d;\n      cell.onclick = (ev) => {\n        ev.stopPropagation();\n        dailyDate = new Date(year, month, d);\n        dpOpen = false;\n        document.getElementById('dailyPickerPopup').classList.remove('open');\n        renderDailyPanel();\n      };\n    }\n    grid.appendChild(cell);\n  });\n}\n\n// \u2500\u2500 HABIT TRACKER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst HT_DAYS  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];\nconst HT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nlet habitWeekOffset = 0;\n\nfunction hDateKey(d) {\n  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n}\n\nfunction renderHabits() {\n  if (!state.habits) state.habits = { list: [], log: {} };\n  const { list, log } = state.habits;\n\n  const today = new Date(); today.setHours(0,0,0,0);\n  const monday = getMonday(today);\n  monday.setDate(monday.getDate() + habitWeekOffset * 7);\n  const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);\n\n  // Week label\n  const ml = HT_MONTHS[monday.getMonth()], sl = HT_MONTHS[sunday.getMonth()];\n  document.getElementById('habitWeekLabel').textContent =\n    ml + ' ' + monday.getDate() + ' \u2013 ' + (ml !== sl ? sl + ' ' : '') + sunday.getDate();\n\n  const days = Array.from({length: 7}, (_, i) => {\n    const d = new Date(monday); d.setDate(d.getDate() + i); return d;\n  });\n\n  const wrap = document.getElementById('habitsTableWrap');\n\n  const addRow = `<div class=\"habits-add-row\">\n    <input class=\"habit-name-input\" id=\"habitNameInput\" type=\"text\" placeholder=\"New habit name\u2026\" maxlength=\"30\"\n      onkeydown=\"if(event.key==='Enter')addHabit()\">\n    <button class=\"btn-primary\" style=\"font-size:11px;padding:5px 11px\" onclick=\"addHabit()\">+ Add habit</button>\n  </div>`;\n\n  if (!list.length) {\n    wrap.innerHTML = '<div class=\"habits-empty\">No habits yet \u2014 add one to start tracking.</div>' + addRow;\n    return;\n  }\n\n  let html = '<table class=\"habits-table\"><thead><tr><th>Day</th>';\n  list.forEach(h => {\n    html += `<th><span class=\"habit-col-hdr\">\n      <span>${h.name.replace(/</g,'&lt;')}</span>\n      <button class=\"habit-col-del\" title=\"Remove\" onclick=\"deleteHabit('${h.id}')\">\u00d7</button>\n    </span></th>`;\n  });\n  html += '<th class=\"habit-add-th\" onclick=\"document.getElementById(\\'habitNameInput\\').focus()\" title=\"Add habit\">+</th>';\n  html += '</tr></thead><tbody>';\n\n  days.forEach((d, i) => {\n    const dk = hDateKey(d);\n    const isToday = d.toDateString() === today.toDateString();\n    html += `<tr${isToday ? ' class=\"habit-today\"' : ''}>`;\n    html += `<td><span class=\"habit-day-name\">${HT_DAYS[i]}</span>\n             <span class=\"habit-day-date\">${HT_MONTHS[d.getMonth()]} ${d.getDate()}</span></td>`;\n    list.forEach(h => {\n      const checked = log[dk] && log[dk][h.id] ? 'checked' : '';\n      html += `<td><input type=\"checkbox\" class=\"habit-cb\" ${checked}\n        onchange=\"toggleHabit('${dk}','${h.id}',this.checked)\"></td>`;\n    });\n    html += '<td></td></tr>';\n  });\n\n  html += '</tbody></table>';\n  wrap.innerHTML = html + addRow;\n}\n\nfunction toggleHabit(dk, habitId, checked) {\n  if (!state.habits.log) state.habits.log = {};\n  if (!state.habits.log[dk]) state.habits.log[dk] = {};\n  if (checked) state.habits.log[dk][habitId] = true;\n  else delete state.habits.log[dk][habitId];\n  save();\n}\n\nfunction addHabit() {\n  const inp = document.getElementById('habitNameInput');\n  const name = inp ? inp.value.trim() : '';\n  if (!name) return;\n  if (!state.habits.list) state.habits.list = [];\n  state.habits.list.push({ id: uid(), name });\n  save();\n  renderHabits();\n  const newInp = document.getElementById('habitNameInput');\n  if (newInp) { newInp.value = ''; newInp.focus(); }\n}\n\nfunction deleteHabit(id) {\n  state.habits.list = (state.habits.list || []).filter(h => h.id !== id);\n  Object.values(state.habits.log || {}).forEach(day => delete day[id]);\n  save();\n  renderHabits();\n}\n\nfunction shiftHabitWeek(delta) { habitWeekOffset += delta; renderHabits(); }\nfunction goTodayHabits() { habitWeekOffset = 0; renderHabits(); }\n\nlet hpDate = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();\nlet hpOpen = false;\n\nfunction toggleHabitPicker(e) {\n  if (e) e.stopPropagation();\n  const popup = document.getElementById('habitPickerPopup');\n  const panel = document.getElementById('habitsPanel');\n  hpOpen = !hpOpen;\n  if (hpOpen) {\n    const today = new Date(); today.setHours(0,0,0,0);\n    const mon = getMonday(today);\n    mon.setDate(mon.getDate() + habitWeekOffset * 7);\n    hpDate = new Date(mon.getFullYear(), mon.getMonth(), 1);\n    renderHabitPicker();\n    popup.classList.add('open');\n    if (panel) panel.style.overflow = 'visible';\n  } else {\n    popup.classList.remove('open');\n    if (panel) panel.style.overflow = '';\n  }\n}\n\nfunction shiftHabitPickerMonth(delta, e) {\n  if (e) e.stopPropagation();\n  hpDate = new Date(hpDate.getFullYear(), hpDate.getMonth() + delta, 1);\n  renderHabitPicker();\n}\n\nfunction renderHabitPicker() {\n  const MONTHS = ['January','February','March','April','May','June',\n                  'July','August','September','October','November','December'];\n  const year  = hpDate.getFullYear();\n  const month = hpDate.getMonth();\n  const today = new Date();\n\n  document.getElementById('hpLabel').textContent     = MONTHS[month];\n  document.getElementById('hpYearLabel').textContent = year;\n\n  // Compute the currently selected week\n  const baseMon = getMonday(new Date()); baseMon.setHours(0,0,0,0);\n  baseMon.setDate(baseMon.getDate() + habitWeekOffset * 7);\n  const baseSun = new Date(baseMon); baseSun.setDate(baseSun.getDate() + 6);\n\n  const grid = document.getElementById('hpGrid');\n  grid.innerHTML = '';\n\n  const startDow    = (new Date(year, month, 1).getDay() + 6) % 7;\n  const daysInMonth = new Date(year, month + 1, 0).getDate();\n\n  let cells = [];\n  for (let i = 0; i < startDow; i++) cells.push(null);\n  for (let d = 1; d <= daysInMonth; d++) cells.push(d);\n  while (cells.length % 7 !== 0) cells.push(null);\n\n  // Build week rows so we can highlight the selected week\n  for (let w = 0; w < cells.length / 7; w++) {\n    const week = cells.slice(w*7, w*7+7);\n    const rowInView = week.some(d => {\n      if (!d) return false;\n      const dt = new Date(year, month, d); dt.setHours(0,0,0,0);\n      return dt >= baseMon && dt <= baseSun;\n    });\n\n    week.forEach(d => {\n      const cell = document.createElement('div');\n      cell.className = 'mp-cell';\n      if (!d) {\n        cell.classList.add('empty');\n      } else {\n        const dt = new Date(year, month, d); dt.setHours(0,0,0,0);\n        const isT = dt.toDateString() === today.toDateString();\n        if (isT) cell.classList.add('mp-today');\n        if (rowInView) cell.style.background = 'var(--burg-xs)';\n        cell.textContent = d;\n        cell.onclick = (ev) => {\n          ev.stopPropagation();\n          const clicked = new Date(year, month, d); clicked.setHours(0,0,0,0);\n          const newMon  = getMonday(clicked);\n          const thisMon = getMonday(new Date()); thisMon.setHours(0,0,0,0);\n          habitWeekOffset = Math.round((newMon - thisMon) / (7 * 86400000));\n          hpOpen = false;\n          document.getElementById('habitPickerPopup').classList.remove('open');\n          document.getElementById('habitsPanel').style.overflow = '';\n          renderHabits();\n        };\n      }\n      grid.appendChild(cell);\n    });\n  }\n}\n\n// Close habit picker on outside click\ndocument.addEventListener('click', e => {\n  const popup = document.getElementById('habitPickerPopup');\n  if (hpOpen && popup && !popup.contains(e.target)) {\n    hpOpen = false;\n    popup.classList.remove('open');\n    const panel = document.getElementById('habitsPanel');\n    if (panel) panel.style.overflow = '';\n  }\n});\n\n// \u2500\u2500 REMINDERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst REM_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n\nfunction renderReminders() {\n  const body = document.getElementById('remindersBody');\n  const items = state.reminders || [];\n  const addRow = `\n    <div class=\"reminders-add-row\">\n      <input class=\"reminder-text-input\" id=\"reminderTextInput\" type=\"text\"\n        placeholder=\"Add a reminder\u2026\"\n        onkeydown=\"if(event.key==='Enter')addReminder()\">\n      <input class=\"reminder-date-input\" id=\"reminderDateInput\" type=\"date\">\n      <button class=\"btn-primary\" style=\"font-size:11px;padding:5px 11px;white-space:nowrap\" onclick=\"addReminder()\">+ Add</button>\n    </div>`;\n\n  if (!items.length) {\n    body.innerHTML = '<div class=\"reminders-empty\">No reminders yet.</div>' + addRow;\n    return;\n  }\n\n  const today = new Date(); today.setHours(0,0,0,0);\n  const sorted = [...items].sort((a, b) => {\n    if (!a.date && !b.date) return 0;\n    if (!a.date) return 1;\n    if (!b.date) return -1;\n    return a.date.localeCompare(b.date);\n  });\n\n  let html = '';\n  sorted.forEach(item => {\n    let dateBadge = '';\n    if (item.date) {\n      const [y,m,d] = item.date.split('-').map(Number);\n      const target = new Date(y, m-1, d);\n      const diff = Math.round((target - today) / 86400000);\n      const label = diff < 0\n        ? `${Math.abs(diff)}d ago`\n        : diff === 0 ? 'Today'\n        : diff === 1 ? 'Tomorrow'\n        : `${REM_MONTHS[m-1]} ${d}`;\n      const cls = diff < 0 ? 'overdue' : diff <= 2 ? 'soon' : '';\n      dateBadge = `<span class=\"reminder-date-tag ${cls}\">${label}</span>`;\n    }\n    html += `\n      <div class=\"reminder-item\">\n        <div class=\"reminder-dot\"></div>\n        <div class=\"reminder-content\">\n          <div class=\"reminder-text\">${item.text.replace(/</g,'&lt;')}</div>\n          ${dateBadge}\n        </div>\n        <button class=\"reminder-del\" title=\"Delete\" onclick=\"deleteReminder('${item.id}')\">\u00d7</button>\n      </div>`;\n  });\n\n  body.innerHTML = html + addRow;\n}\n\nfunction addReminder() {\n  const text = document.getElementById('reminderTextInput').value.trim();\n  if (!text) return;\n  const date = document.getElementById('reminderDateInput').value || null;\n  if (!state.reminders) state.reminders = [];\n  state.reminders.push({ id: uid(), text, date });\n  save();\n  renderReminders();\n  document.getElementById('reminderTextInput').focus();\n}\n\nfunction deleteReminder(id) {\n  state.reminders = (state.reminders || []).filter(r => r.id !== id);\n  save();\n  renderReminders();\n}\n\n// \u2500\u2500 BRAIN DUMP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet bdSaveTimer = null;\n\nfunction renderBrainDump() {\n  document.getElementById('braindumpTextarea').value = state.brainDump || '';\n}\n\nfunction saveBrainDump() {\n  state.brainDump = document.getElementById('braindumpTextarea').value;\n  save();\n  const lbl = document.getElementById('braindumpSaved');\n  lbl.style.opacity = '1';\n  clearTimeout(bdSaveTimer);\n  bdSaveTimer = setTimeout(() => { lbl.style.opacity = '0'; }, 1400);\n}\n\nfunction clearBrainDump() {\n  if (!state.brainDump) return;\n  if (!confirm('Clear your brain dump?')) return;\n  state.brainDump = '';\n  save();\n  renderBrainDump();\n}\n\n// \u2500\u2500 COUNTDOWNS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst CD_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nlet selectedCdColor = 'burg';\n\nfunction renderCountdowns() {\n  const grid = document.getElementById('countdownsGrid');\n  const items = state.countdowns || [];\n  if (!items.length) {\n    grid.innerHTML = '<div class=\"countdowns-empty\">No countdowns yet \u2014 add one to track an important date.</div>';\n    return;\n  }\n  const today = new Date(); today.setHours(0,0,0,0);\n  const sorted = [...items].sort((a,b) => a.date.localeCompare(b.date));\n  grid.innerHTML = '';\n  sorted.forEach(item => {\n    const [y,m,d] = item.date.split('-').map(Number);\n    const target = new Date(y, m-1, d);\n    const diff = Math.round((target - today) / 86400000);\n    const colorHex = (GOAL_COLORS.find(c => c.id === item.color) || GOAL_COLORS[0]).hex;\n    const dateDisp = CD_MONTHS[m-1] + ' ' + d + ', ' + y;\n\n    let numHtml, unitHtml;\n    if (diff === 0) {\n      numHtml = `<div class=\"countdown-today-label\" style=\"color:${colorHex}\">TODAY</div>`;\n      unitHtml = '';\n    } else if (diff < 0) {\n      numHtml = `<div class=\"countdown-number\" style=\"color:${colorHex}\">${Math.abs(diff)}</div>`;\n      unitHtml = `<div class=\"countdown-unit\" style=\"color:${colorHex}\">${Math.abs(diff) === 1 ? 'DAY AGO' : 'DAYS AGO'}</div>`;\n    } else {\n      numHtml = `<div class=\"countdown-number\" style=\"color:${colorHex}\">${diff}</div>`;\n      unitHtml = `<div class=\"countdown-unit\" style=\"color:${colorHex}\">${diff === 1 ? 'DAY' : 'DAYS'}</div>`;\n    }\n\n    const card = document.createElement('div');\n    card.className = 'countdown-card';\n    card.innerHTML = `\n      <button class=\"countdown-del\" title=\"Delete\" onclick=\"deleteCountdown('${item.id}')\">\u00d7</button>\n      ${numHtml}${unitHtml}\n      <div class=\"countdown-label\">${item.label.replace(/</g,'&lt;')}</div>\n      <div class=\"countdown-date-small\">${dateDisp}</div>`;\n    grid.appendChild(card);\n  });\n}\n\nfunction openAddCountdownModal() {\n  document.getElementById('cdLabelInput').value = '';\n  document.getElementById('cdDateInput').value = '';\n  selectedCdColor = 'burg';\n  renderCdColorRow();\n  openModal('countdownModal');\n}\n\nfunction renderCdColorRow() {\n  const row = document.getElementById('cdColorRow');\n  row.innerHTML = '';\n  GOAL_COLORS.forEach(c => {\n    const dot = document.createElement('span');\n    dot.className = 'color-dot' + (c.id === selectedCdColor ? ' selected' : '');\n    dot.style.background = c.hex;\n    dot.title = c.id;\n    dot.onclick = () => { selectedCdColor = c.id; renderCdColorRow(); };\n    row.appendChild(dot);\n  });\n}\n\nfunction saveCountdown() {\n  const label = document.getElementById('cdLabelInput').value.trim();\n  const date  = document.getElementById('cdDateInput').value;\n  if (!label || !date) return;\n  if (!state.countdowns) state.countdowns = [];\n  state.countdowns.push({ id: uid(), label, date, color: selectedCdColor });\n  save();\n  renderCountdowns();\n  closeModal('countdownModal');\n}\n\nfunction deleteCountdown(id) {\n  state.countdowns = (state.countdowns || []).filter(c => c.id !== id);\n  save();\n  renderCountdowns();\n}\n\n// \u2500\u2500 GOALS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst GOAL_COLORS = [\n  { id:'burg',     hex:'#7B2335' },\n  { id:'blue',     hex:'#4A7FA5' },\n  { id:'mint',     hex:'#4A9B6F' },\n  { id:'lavender', hex:'#7B68C8' },\n  { id:'peach',    hex:'#C4783A' },\n  { id:'rose',     hex:'#B85070' },\n  { id:'yellow',   hex:'#A08030' },\n];\n\nlet editingGoalId = null;\nlet selectedGoalColor = 'burg';\n\nfunction renderGoals() {\n  const body = document.getElementById('goalsBody');\n  if (!state.goals.length) {\n    body.innerHTML = '<div class=\"goal-empty\">No goals yet \u2014 add one to get started.</div>';\n    return;\n  }\n  body.innerHTML = '';\n  state.goals.forEach(g => {\n    const done = (g.items||[]).filter(i=>i.done).length;\n    const total = (g.items||[]).length;\n    const colorHex = GOAL_COLORS.find(c=>c.id===g.color)?.hex || '#7B2335';\n\n    const card = document.createElement('div');\n    card.className = 'goal-card' + (g.expanded ? ' expanded' : '');\n    card.id = 'goal-' + g.id;\n\n    // dots (max 10 shown)\n    const dotCount = Math.min(total, 10);\n    let dotsHtml = '';\n    for (let i=0;i<dotCount;i++) {\n      dotsHtml += `<div class=\"gdot${i<done?' filled':''}\" style=\"--goal-color:${colorHex}\"></div>`;\n    }\n\n    card.innerHTML = `\n      <div class=\"goal-header\" onclick=\"toggleGoal('${g.id}')\">\n        <div class=\"goal-color-bar\" style=\"background:${colorHex}\"></div>\n        <div class=\"goal-info\">\n          <div class=\"goal-title\">${g.title}</div>\n          <div class=\"goal-progress-row\">\n            <div class=\"goal-dots\">${dotsHtml}</div>\n            <span class=\"goal-fraction\">${done}/${total}</span>\n          </div>\n        </div>\n        <div class=\"goal-actions\">\n          <button class=\"goal-action-btn\" title=\"Edit\" onclick=\"event.stopPropagation();openEditGoalModal('${g.id}')\">\u270f\ufe0f</button>\n          <button class=\"goal-action-btn\" title=\"Delete\" onclick=\"event.stopPropagation();deleteGoal('${g.id}')\">\ud83d\uddd1</button>\n        </div>\n        <div class=\"goal-chevron\">\u203a</div>\n      </div>\n      <div class=\"goal-items\" id=\"goalItems-${g.id}\" style=\"--goal-color:${colorHex}\">\n        ${(g.items||[]).map(item => `\n          <div class=\"goal-item-row\" id=\"gitem-${item.id}\">\n            <input type=\"checkbox\" ${item.done?'checked':''} onchange=\"toggleGoalItem('${g.id}','${item.id}')\">\n            <span class=\"goal-item-text${item.done?' done':''}\">${item.text}</span>\n            <button class=\"goal-item-del\" onclick=\"deleteGoalItem('${g.id}','${item.id}')\">\u00d7</button>\n          </div>\n        `).join('')}\n        <div class=\"goal-add-item-row\">\n          <input class=\"goal-add-input\" id=\"goalAddInput-${g.id}\" type=\"text\" placeholder=\"Add checklist item\u2026\" onkeydown=\"if(event.key==='Enter')addGoalItem('${g.id}')\">\n          <button class=\"goal-add-submit\" onclick=\"addGoalItem('${g.id}')\">Add</button>\n        </div>\n      </div>`;\n    body.appendChild(card);\n  });\n}\n\nfunction toggleGoal(id) {\n  const g = state.goals.find(x=>x.id===id);\n  if (g) { g.expanded = !g.expanded; save(); renderGoals(); }\n}\n\nfunction addGoalItem(goalId) {\n  const inp = document.getElementById('goalAddInput-'+goalId);\n  const text = inp.value.trim();\n  if (!text) return;\n  const g = state.goals.find(x=>x.id===goalId);\n  if (!g) return;\n  if (!g.items) g.items = [];\n  g.items.push({ id:uid(), text, done:false });\n  g.expanded = true;\n  save(); renderGoals();\n  const newInp = document.getElementById('goalAddInput-'+goalId);\n  if (newInp) newInp.focus();\n}\n\nfunction toggleGoalItem(goalId, itemId) {\n  const g = state.goals.find(x=>x.id===goalId);\n  if (!g) return;\n  const item = (g.items||[]).find(i=>i.id===itemId);\n  if (item) { item.done = !item.done; save(); renderGoals(); }\n}\n\nfunction deleteGoalItem(goalId, itemId) {\n  const g = state.goals.find(x=>x.id===goalId);\n  if (!g) return;\n  g.items = (g.items||[]).filter(i=>i.id!==itemId);\n  save(); renderGoals();\n}\n\nfunction deleteGoal(id) {\n  state.goals = state.goals.filter(g=>g.id!==id);\n  save(); renderGoals();\n}\n\nfunction openAddGoalModal() {\n  editingGoalId = null;\n  document.getElementById('goalModalTitle').textContent = 'Add Goal';\n  document.getElementById('goalTitleInput').value = '';\n  selectedGoalColor = 'burg';\n  renderGoalColorPicker('goalColorRow');\n  openModal('goalModal');\n  setTimeout(()=>document.getElementById('goalTitleInput').focus(),80);\n}\n\nfunction openEditGoalModal(id) {\n  const g = state.goals.find(x=>x.id===id);\n  if (!g) return;\n  editingGoalId = id;\n  document.getElementById('goalModalTitle').textContent = 'Edit Goal';\n  document.getElementById('goalTitleInput').value = g.title;\n  selectedGoalColor = g.color || 'burg';\n  renderGoalColorPicker('goalColorRow');\n  openModal('goalModal');\n  setTimeout(()=>document.getElementById('goalTitleInput').focus(),80);\n}\n\nfunction renderGoalColorPicker(containerId) {\n  const row = document.getElementById(containerId);\n  row.innerHTML = GOAL_COLORS.map(c=>`\n    <div class=\"cls-color-dot${selectedGoalColor===c.id?' selected':''}\"\n      style=\"background:${c.hex}\"\n      onclick=\"selectedGoalColor='${c.id}';renderGoalColorPicker('${containerId}')\"></div>\n  `).join('');\n}\n\nfunction saveGoal() {\n  const title = document.getElementById('goalTitleInput').value.trim();\n  if (!title) return;\n  if (editingGoalId) {\n    const g = state.goals.find(x=>x.id===editingGoalId);\n    if (g) { g.title = title; g.color = selectedGoalColor; }\n  } else {\n    state.goals.push({ id:uid(), title, color:selectedGoalColor, items:[], expanded:false });\n  }\n  save(); renderGoals(); closeModal('goalModal');\n}\n\n// \u2500\u2500 CLASSES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst CLASS_COLORS = GOAL_COLORS;\n\nlet editingClassId = null;\nlet selectedClassColor = 'blue';\nlet currentClsId = null;\nlet currentClsTab = 'info';\n\nfunction renderClasses() {\n  const grid = document.getElementById('classesGrid');\n  if (!state.classes.length) {\n    grid.innerHTML = '<div class=\"classes-empty\">No classes yet \u2014 add one to get started.</div>';\n    return;\n  }\n  grid.innerHTML = '';\n  state.classes.forEach(cls => {\n    const colorHex = CLASS_COLORS.find(c=>c.id===cls.color)?.hex || '#4A7FA5';\n    const tags = (cls.schedule||[]).map(s=>\n      `<span class=\"class-schedule-tag\" style=\"background:${colorHex}22;color:${colorHex}\">${s.day.slice(0,3)}</span>`\n    ).join('');\n    const card = document.createElement('div');\n    card.className = 'class-card';\n    card.onclick = () => openClsDrawer(cls.id);\n    card.innerHTML = `\n      <div class=\"class-card-accent\" style=\"background:${colorHex}\"></div>\n      <div class=\"class-card-body\">\n        <div class=\"class-card-subject\">${cls.subject}</div>\n        <div class=\"class-card-teacher\">${cls.teacher||'No teacher set'}</div>\n        <div class=\"class-card-schedule\">${tags}</div>\n      </div>`;\n    grid.appendChild(card);\n  });\n}\n\nfunction openAddClassModal() {\n  editingClassId = null;\n  document.getElementById('classModalTitle').textContent = 'Add Class';\n  document.getElementById('classSubjectInput').value = '';\n  document.getElementById('classTeacherInput').value = '';\n  document.getElementById('classRoomInput').value = '';\n  selectedClassColor = 'blue';\n  renderClassColorPicker('classColorRow');\n  openModal('classModal');\n  setTimeout(()=>document.getElementById('classSubjectInput').focus(),80);\n}\n\nfunction renderClassColorPicker(containerId) {\n  const row = document.getElementById(containerId);\n  row.innerHTML = CLASS_COLORS.map(c=>`\n    <div class=\"cls-color-dot${selectedClassColor===c.id?' selected':''}\"\n      style=\"background:${c.hex}\"\n      onclick=\"selectedClassColor='${c.id}';renderClassColorPicker('${containerId}')\"></div>\n  `).join('');\n}\n\nfunction saveClass() {\n  const subject = document.getElementById('classSubjectInput').value.trim();\n  if (!subject) return;\n  const teacher = document.getElementById('classTeacherInput').value.trim();\n  const room = document.getElementById('classRoomInput').value.trim();\n  if (editingClassId) {\n    const cls = state.classes.find(x=>x.id===editingClassId);\n    if (cls) { cls.subject=subject; cls.teacher=teacher; cls.room=room; cls.color=selectedClassColor; }\n  } else {\n    state.classes.push({ id:uid(), subject, teacher, room, color:selectedClassColor,\n      schedule:[], assignments:[], homework:[], reminders:[], notes:'', lessonPlan:[] });\n  }\n  save(); renderClasses(); closeModal('classModal');\n  if (editingClassId && currentClsId===editingClassId) refreshClsDrawerHeader();\n}\n\n// Drawer open/close\nfunction openClsDrawer(id) {\n  currentClsId = id;\n  currentClsTab = 'info';\n  document.getElementById('clsDrawerBackdrop').classList.add('open');\n  refreshClsDrawerHeader();\n  switchClsTab('info');\n}\n\nfunction closeClsDrawer(e) {\n  if (e && e.target !== document.getElementById('clsDrawerBackdrop')) return;\n  if (!e) {\n    document.getElementById('clsDrawerBackdrop').classList.remove('open');\n    currentClsId = null;\n  } else {\n    document.getElementById('clsDrawerBackdrop').classList.remove('open');\n    currentClsId = null;\n  }\n}\n\nfunction refreshClsDrawerHeader() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const colorHex = CLASS_COLORS.find(c=>c.id===cls.color)?.hex || '#4A7FA5';\n  document.getElementById('clsDrawerTitle').textContent = cls.subject;\n  document.getElementById('clsHeroDot').style.background = colorHex;\n  document.getElementById('clsHeroSubject').textContent = cls.subject;\n  document.getElementById('clsHeroTeacher').textContent = cls.teacher || 'No teacher set';\n}\n\nfunction switchClsTab(tab) {\n  currentClsTab = tab;\n  document.querySelectorAll('.cls-tab-btn').forEach(btn => {\n    btn.classList.toggle('active', btn.dataset.tab === tab);\n  });\n  document.querySelectorAll('.cls-tab-section').forEach(sec => {\n    sec.classList.toggle('active', sec.id === 'clsTab-'+tab);\n  });\n  renderClsTab(tab);\n}\n\nfunction renderClsTab(tab) {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const colorHex = CLASS_COLORS.find(c=>c.id===cls.color)?.hex || '#4A7FA5';\n\n  if (tab==='info') {\n    document.getElementById('clsInfoSubject').value = cls.subject||'';\n    document.getElementById('clsInfoTeacher').value = cls.teacher||'';\n    document.getElementById('clsInfoRoom').value = cls.room||'';\n    selectedClassColor = cls.color||'blue';\n    renderClassColorPicker('clsInfoColorRow');\n  }\n  if (tab==='schedule') {\n    const list = document.getElementById('clsScheduleList');\n    list.innerHTML = (cls.schedule||[]).map(s=>`\n      <div class=\"cls-schedule-row\">\n        <span class=\"cls-schedule-day\">${s.day}</span>\n        <span class=\"cls-schedule-time\">${s.start||''} \u2013 ${s.end||''}</span>\n        <button class=\"cls-del-btn\" onclick=\"deleteClsSchedule('${s.id}')\">\u00d7</button>\n      </div>`).join('') || '<div style=\"color:var(--muted);font-size:13px;font-style:italic\">No schedule entries yet.</div>';\n  }\n  if (tab==='assignments') renderClsList('clsAssignmentList', cls.assignments||[], colorHex, 'assignment');\n  if (tab==='homework')    renderClsList('clsHomeworkList',   cls.homework||[],     colorHex, 'homework');\n  if (tab==='reminders')   renderClsReminderList(cls.reminders||[]);\n  if (tab==='notes') {\n    document.getElementById('clsNotesArea').value = cls.notes||'';\n  }\n  if (tab==='lessonplan') renderClsLessonPlan(cls.lessonPlan||[]);\n}\n\nfunction renderClsList(containerId, items, colorHex, type) {\n  const el = document.getElementById(containerId);\n  const today = dateKey(new Date());\n  el.innerHTML = items.map(item => {\n    const overdue = item.due && item.due < today && !item.done;\n    const dueToday = item.due && item.due === today;\n    const dueCls = overdue ? 'due-soon' : (dueToday ? 'due-today' : '');\n    return `<div class=\"cls-list-row${item.done?' done-row':''}\">\n      <input type=\"checkbox\" ${item.done?'checked':''} onchange=\"toggleClsItem('${type}','${item.id}')\">\n      <div class=\"cls-list-body\">\n        <div class=\"cls-list-title${item.done?' done':''}\">${item.title}</div>\n        ${item.due?`<div class=\"cls-list-meta ${dueCls}\">Due: ${item.due}</div>`:''}\n      </div>\n      <button class=\"cls-del-btn\" onclick=\"deleteClsItem('${type}','${item.id}')\">\u00d7</button>\n    </div>`;\n  }).join('') || '<div style=\"color:var(--muted);font-size:13px;font-style:italic\">Nothing here yet.</div>';\n}\n\nfunction renderClsReminderList(items) {\n  const el = document.getElementById('clsReminderList');\n  const today = dateKey(new Date());\n  el.innerHTML = items.map(item => {\n    const overdue = item.date && item.date < today && !item.done;\n    return `<div class=\"cls-list-row${item.done?' done-row':''}\">\n      <input type=\"checkbox\" ${item.done?'checked':''} onchange=\"toggleClsItem('reminders','${item.id}')\">\n      <div class=\"cls-list-body\">\n        <div class=\"cls-list-title${item.done?' done':''}\">${item.text}</div>\n        ${item.date?`<div class=\"cls-list-meta${overdue?' due-soon':''}\">Date: ${item.date}</div>`:''}\n      </div>\n      <button class=\"cls-del-btn\" onclick=\"deleteClsItem('reminders','${item.id}')\">\u00d7</button>\n    </div>`;\n  }).join('') || '<div style=\"color:var(--muted);font-size:13px;font-style:italic\">No reminders yet.</div>';\n}\n\nfunction renderClsLessonPlan(items) {\n  const el = document.getElementById('clsLessonPlanList');\n  const sorted = [...items].sort((a,b)=>a.date.localeCompare(b.date));\n  el.innerHTML = sorted.map(item=>`\n    <div class=\"cls-lp-entry\">\n      <div class=\"cls-lp-date\" style=\"display:flex;align-items:center;justify-content:space-between\">\n        <span>${item.date}</span>\n        <button class=\"cls-del-btn\" style=\"opacity:1\" onclick=\"deleteClsLp('${item.id}')\">\u00d7</button>\n      </div>\n      <div class=\"cls-lp-topic\">${item.topic}</div>\n      ${item.notes?`<div class=\"cls-lp-notes\">${item.notes}</div>`:''}\n    </div>`).join('') || '<div style=\"color:var(--muted);font-size:13px;font-style:italic\">No lesson plan entries yet.</div>';\n}\n\n// Info tab live-save\nfunction saveClsInfo() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  cls.subject = document.getElementById('clsInfoSubject').value;\n  cls.teacher = document.getElementById('clsInfoTeacher').value;\n  cls.room    = document.getElementById('clsInfoRoom').value;\n  cls.color   = selectedClassColor;\n  save(); renderClasses(); refreshClsDrawerHeader();\n}\n\n// Notes\nfunction saveClsNotes() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  cls.notes = document.getElementById('clsNotesArea').value;\n  save();\n}\n\n// Schedule\nfunction addClsSchedule() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const day   = document.getElementById('clsSchedDay').value;\n  const start = document.getElementById('clsSchedStart').value;\n  const end   = document.getElementById('clsSchedEnd').value;\n  if (!day) return;\n  if (!cls.schedule) cls.schedule = [];\n  cls.schedule.push({ id:uid(), day, start, end });\n  save(); renderClasses(); renderClsTab('schedule');\n}\n\nfunction deleteClsSchedule(sid) {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  cls.schedule = (cls.schedule||[]).filter(s=>s.id!==sid);\n  save(); renderClasses(); renderClsTab('schedule');\n}\n\n// Assignments / Homework\nfunction addClsAssignment() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const title = document.getElementById('clsAssignTitle').value.trim();\n  if (!title) return;\n  const due = document.getElementById('clsAssignDue').value;\n  if (!cls.assignments) cls.assignments = [];\n  cls.assignments.push({ id:uid(), title, due, done:false });\n  document.getElementById('clsAssignTitle').value = '';\n  document.getElementById('clsAssignDue').value = '';\n  save(); renderClsTab('assignments');\n}\n\nfunction addClsHomework() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const title = document.getElementById('clsHwTitle').value.trim();\n  if (!title) return;\n  const due = document.getElementById('clsHwDue').value;\n  if (!cls.homework) cls.homework = [];\n  cls.homework.push({ id:uid(), title, due, done:false });\n  document.getElementById('clsHwTitle').value = '';\n  document.getElementById('clsHwDue').value = '';\n  save(); renderClsTab('homework');\n}\n\nfunction addClsReminder() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const text = document.getElementById('clsReminderText').value.trim();\n  if (!text) return;\n  const date = document.getElementById('clsReminderDate').value;\n  if (!cls.reminders) cls.reminders = [];\n  cls.reminders.push({ id:uid(), text, date, done:false });\n  document.getElementById('clsReminderText').value = '';\n  document.getElementById('clsReminderDate').value = '';\n  save(); renderClsTab('reminders');\n}\n\nfunction addClsLessonPlan() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const date  = document.getElementById('clsLpDate').value;\n  const topic = document.getElementById('clsLpTopic').value.trim();\n  if (!date || !topic) return;\n  const notes = document.getElementById('clsLpNotes').value.trim();\n  if (!cls.lessonPlan) cls.lessonPlan = [];\n  cls.lessonPlan.push({ id:uid(), date, topic, notes });\n  document.getElementById('clsLpDate').value = '';\n  document.getElementById('clsLpTopic').value = '';\n  document.getElementById('clsLpNotes').value = '';\n  save(); renderClsTab('lessonplan');\n}\n\nfunction toggleClsItem(type, itemId) {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  const arr = type==='assignment' ? cls.assignments : type==='homework' ? cls.homework : cls.reminders;\n  const item = (arr||[]).find(i=>i.id===itemId);\n  if (item) { item.done = !item.done; save(); renderClsTab(currentClsTab); }\n}\n\nfunction deleteClsItem(type, itemId) {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  if (type==='assignment') cls.assignments = (cls.assignments||[]).filter(i=>i.id!==itemId);\n  else if (type==='homework') cls.homework = (cls.homework||[]).filter(i=>i.id!==itemId);\n  else cls.reminders = (cls.reminders||[]).filter(i=>i.id!==itemId);\n  save(); renderClsTab(currentClsTab);\n}\n\nfunction deleteClsLp(id) {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  cls.lessonPlan = (cls.lessonPlan||[]).filter(i=>i.id!==id);\n  save(); renderClsTab('lessonplan');\n}\n\nfunction editCurrentClass() {\n  const cls = state.classes.find(x=>x.id===currentClsId);\n  if (!cls) return;\n  editingClassId = cls.id;\n  document.getElementById('classModalTitle').textContent = 'Edit Class';\n  document.getElementById('classSubjectInput').value = cls.subject||'';\n  document.getElementById('classTeacherInput').value = cls.teacher||'';\n  document.getElementById('classRoomInput').value = cls.room||'';\n  selectedClassColor = cls.color||'blue';\n  renderClassColorPicker('classColorRow');\n  openModal('classModal');\n}\n\nfunction deleteCurrentClass() {\n  if (!confirm('Delete this class and all its data?')) return;\n  state.classes = state.classes.filter(x=>x.id!==currentClsId);\n  save(); renderClasses();\n  document.getElementById('clsDrawerBackdrop').classList.remove('open');\n  currentClsId = null;\n}\n\n// Color picker used inside drawer info tab (re-uses renderClassColorPicker with 'clsInfoColorRow')\n// but needs to update cls.color immediately\nconst _origRenderClassColorPicker = renderClassColorPicker;\nfunction renderClassColorPicker(containerId) {\n  const row = document.getElementById(containerId);\n  if (!row) return;\n  row.innerHTML = CLASS_COLORS.map(c=>`\n    <div class=\"cls-color-dot${selectedClassColor===c.id?' selected':''}\"\n      style=\"background:${c.hex}\"\n      onclick=\"selectedClassColor='${c.id}';renderClassColorPicker('${containerId}');${containerId==='clsInfoColorRow'?'saveClsInfo();':''}\"></div>\n  `).join('');\n}\n\n// Close drawer with Escape\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape') {\n    const backdrop = document.getElementById('clsDrawerBackdrop');\n    if (backdrop && backdrop.classList.contains('open')) {\n      backdrop.classList.remove('open');\n      currentClsId = null;\n    }\n  }\n});\n\n// \u2500\u2500 JOURNAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet journalDate = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();\n\nfunction journalDateKey(d) {\n  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');\n}\n\nconst J_DAY  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\nconst J_MON  = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n\nfunction renderJournal() {\n  const key   = journalDateKey(journalDate);\n  const today = journalDateKey(new Date());\n\n  // Date label\n  const lbl = document.getElementById('journalDateLabel');\n  lbl.textContent = J_DAY[journalDate.getDay()] + ', ' + J_MON[journalDate.getMonth()] + ' ' + journalDate.getDate();\n  lbl.className   = 'journal-date-label' + (key === today ? ' today' : '');\n\n  // Default time input to now when on today\n  const timeInp = document.getElementById('journalTimeInput');\n  if (!timeInp.value || key === today) {\n    const now = new Date();\n    timeInp.value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');\n  }\n\n  // Entries for this date, sorted by time\n  const entries = (state.journal || [])\n    .filter(e => e.date === key)\n    .sort((a, b) => a.time.localeCompare(b.time));\n\n  const container = document.getElementById('journalEntries');\n  if (!entries.length) {\n    container.innerHTML = '<div class=\"journal-empty\">No entries yet \u2014 write your first one below.</div>';\n    return;\n  }\n\n  container.innerHTML = '';\n  entries.forEach(entry => {\n    const row = document.createElement('div');\n    row.className = 'journal-entry';\n\n    // Format 24h \u2192 12h display\n    const [hh, mm] = entry.time.split(':').map(Number);\n    const ampm  = hh >= 12 ? 'PM' : 'AM';\n    const h12   = hh % 12 || 12;\n    const tDisp = h12 + ':' + String(mm).padStart(2,'0') + ' ' + ampm;\n\n    row.innerHTML = `\n      <div class=\"journal-time-col\">\n        <span class=\"journal-time-tag\">${tDisp}</span>\n        <div class=\"journal-dot\"></div>\n      </div>\n      <div class=\"journal-entry-body\" data-id=\"${entry.id}\">\n        <button class=\"journal-entry-del\" title=\"Delete\" onclick=\"deleteJournalEntry('${entry.id}')\">\u00d7</button>\n        <div class=\"journal-entry-text\" title=\"Click to edit\" onclick=\"startEditJournalEntry('${entry.id}')\">${entry.text.replace(/</g,'&lt;').replace(/\\n/g,'<br>')}</div>\n      </div>`;\n    container.appendChild(row);\n  });\n}\n\nfunction saveJournalEntry() {\n  const text = document.getElementById('journalTextarea').value.trim();\n  const time = document.getElementById('journalTimeInput').value;\n  if (!text) return;\n  if (!state.journal) state.journal = [];\n  state.journal.push({ id: uid(), date: journalDateKey(journalDate), time: time || '00:00', text });\n  document.getElementById('journalTextarea').value = '';\n  save();\n  renderJournal();\n  document.getElementById('journalTextarea').focus();\n}\n\nfunction deleteJournalEntry(id) {\n  state.journal = (state.journal || []).filter(e => e.id !== id);\n  save();\n  renderJournal();\n}\n\nfunction startEditJournalEntry(id) {\n  const entry = (state.journal || []).find(e => e.id === id);\n  if (!entry) return;\n  const bodyEl = document.querySelector(`.journal-entry-body[data-id=\"${id}\"]`);\n  if (!bodyEl) return;\n  bodyEl.innerHTML = `\n    <div class=\"journal-entry-edit-form\">\n      <div class=\"journal-entry-edit-time-row\">\n        <span class=\"journal-form-time-label\">Time</span>\n        <input type=\"time\" class=\"journal-time-input\" id=\"jeTime_${id}\" value=\"${entry.time}\">\n      </div>\n      <textarea class=\"journal-textarea\" id=\"jeText_${id}\" style=\"min-height:80px\"></textarea>\n      <div class=\"journal-entry-edit-actions\">\n        <button class=\"journal-entry-edit-save\" onclick=\"saveJournalEntryEdit('${id}')\">Save</button>\n        <button class=\"journal-entry-edit-cancel\" onclick=\"renderJournal()\">Cancel</button>\n      </div>\n    </div>`;\n  const ta = document.getElementById(`jeText_${id}`);\n  ta.value = entry.text;\n  ta.focus();\n  ta.addEventListener('keydown', e => {\n    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveJournalEntryEdit(id); }\n    if (e.key === 'Escape') renderJournal();\n  });\n}\n\nfunction saveJournalEntryEdit(id) {\n  const entry = (state.journal || []).find(e => e.id === id);\n  if (!entry) return;\n  const text = document.getElementById(`jeText_${id}`).value.trim();\n  const time = document.getElementById(`jeTime_${id}`).value;\n  if (!text) return;\n  entry.text = text;\n  if (time) entry.time = time;\n  save();\n  renderJournal();\n}\n\nfunction shiftJournalDate(delta) {\n  journalDate = new Date(journalDate);\n  journalDate.setDate(journalDate.getDate() + delta);\n  renderJournal();\n}\n\nfunction goTodayJournal() {\n  journalDate = new Date();\n  journalDate.setHours(0,0,0,0);\n  renderJournal();\n}\n\nlet jpDate = (() => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); return d; })();\nlet jpOpen  = false;\n\nfunction toggleJournalPicker(e) {\n  if (e) e.stopPropagation();\n  const popup = document.getElementById('journalPickerPopup');\n  jpOpen = !jpOpen;\n  if (jpOpen) {\n    // Sync picker month to the currently viewed journal date\n    jpDate = new Date(journalDate.getFullYear(), journalDate.getMonth(), 1);\n    renderJournalPicker();\n    popup.classList.add('open');\n  } else {\n    popup.classList.remove('open');\n  }\n}\n\nfunction shiftJournalPickerMonth(delta, e) {\n  if (e) e.stopPropagation();\n  jpDate = new Date(jpDate.getFullYear(), jpDate.getMonth() + delta, 1);\n  renderJournalPicker();\n}\n\nfunction renderJournalPicker() {\n  const MONTHS = ['January','February','March','April','May','June',\n                  'July','August','September','October','November','December'];\n  const year  = jpDate.getFullYear();\n  const month = jpDate.getMonth();\n  const today = new Date();\n  const selKey = journalDateKey(journalDate);\n\n  document.getElementById('jpLabel').textContent     = MONTHS[month];\n  document.getElementById('jpYearLabel').textContent = year;\n\n  const grid = document.getElementById('jpGrid');\n  grid.innerHTML = '';\n\n  const startDow    = (new Date(year, month, 1).getDay() + 6) % 7;\n  const daysInMonth = new Date(year, month + 1, 0).getDate();\n\n  let cells = [];\n  for (let i = 0; i < startDow; i++) cells.push(null);\n  for (let d = 1; d <= daysInMonth; d++) cells.push(d);\n  while (cells.length % 7 !== 0) cells.push(null);\n\n  cells.forEach(d => {\n    const cell = document.createElement('div');\n    cell.className = 'mp-cell';\n\n    if (!d) {\n      cell.classList.add('empty');\n    } else {\n      const dt   = new Date(year, month, d);\n      const key  = journalDateKey(dt);\n      const isT  = dt.toDateString() === today.toDateString();\n      const isSel = key === selKey;\n      const hasEntry = (state.journal || []).some(e => e.date === key);\n\n      if (isT)  cell.classList.add('mp-today');\n      if (hasEntry) cell.classList.add('has-events');\n      if (isSel) {\n        cell.style.background   = 'var(--burg)';\n        cell.style.color        = 'white';\n        cell.style.borderRadius = '5px';\n        cell.style.fontWeight   = '700';\n      }\n\n      cell.textContent = d;\n      cell.onclick = (e) => {\n        e.stopPropagation();\n        journalDate = new Date(year, month, d);\n        jpOpen = false;\n        document.getElementById('journalPickerPopup').classList.remove('open');\n        renderJournal();\n      };\n    }\n\n    grid.appendChild(cell);\n  });\n}\n\n// Close daily picker when clicking outside\ndocument.addEventListener('click', e => {\n  const popup = document.getElementById('dailyPickerPopup');\n  if (dpOpen && popup && !popup.contains(e.target)) {\n    dpOpen = false;\n    popup.classList.remove('open');\n    const panel = document.querySelector('.daily-panel');\n    if (panel) panel.style.overflow = '';\n  }\n});\n\n// Close journal picker when clicking outside\ndocument.addEventListener('click', e => {\n  const popup = document.getElementById('journalPickerPopup');\n  if (jpOpen && popup && !popup.contains(e.target)) {\n    jpOpen = false;\n    popup.classList.remove('open');\n  }\n});\n\n// Allow Ctrl+Enter / Cmd+Enter to save from textarea\ndocument.addEventListener('keydown', e => {\n  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {\n    if (document.activeElement === document.getElementById('journalTextarea')) {\n      saveJournalEntry();\n    }\n  }\n});\n\n// \u2500\u2500 EXPORT / IMPORT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction exportPlannerData() {\n  const data = localStorage.getItem('weeklyPlanner_v2') || '{}';\n  const blob = new Blob([data], { type: 'application/json' });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  a.download = 'weekly-planner-backup.json';\n  a.click();\n  URL.revokeObjectURL(url);\n  showDataIoMsg('Data exported successfully.');\n}\nfunction importPlannerData(e) {\n  const file = e.target.files[0];\n  if (!file) return;\n  const reader = new FileReader();\n  reader.onload = function(ev) {\n    try {\n      const parsed = JSON.parse(ev.target.result);\n      localStorage.setItem('weeklyPlanner_v2', JSON.stringify(parsed));\n      showDataIoMsg('Data imported. Reloading\u2026');\n      setTimeout(() => location.reload(), 800);\n    } catch {\n      showDataIoMsg('Invalid file \u2014 import failed.');\n    }\n  };\n  reader.readAsText(file);\n  e.target.value = '';\n}\nfunction showDataIoMsg(msg) {\n  const el = document.getElementById('dataIoMsg');\n  el.textContent = msg;\n  el.style.display = 'block';\n  setTimeout(() => { el.style.display = 'none'; }, 3000);\n}\n\n// \u2500\u2500 CLEAR DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction openClearConfirm() {\n  document.getElementById('confirmBackdrop').classList.add('open');\n}\nfunction closeClearConfirm() {\n  document.getElementById('confirmBackdrop').classList.remove('open');\n}\nfunction confirmClearData() {\n  localStorage.removeItem('weeklyPlanner_v2');\n  location.reload();\n}\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'Escape') closeClearConfirm();\n});\n\n// \u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nload();\nrenderProfile();\nrenderMotPhoto();\nrenderWeek();\nrenderTasks();\nrenderSideTasks();\nrenderCalPanel();\nrenderDailyPanel();\nrenderJournal();\nrenderHabits();\nrenderReminders();\nrenderBrainDump();\nrenderCountdowns();\nrenderGoals();\nrenderClasses();\n<\/script>\n</body>\n</html>\n";
